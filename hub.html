<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 업무 허브 — DOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: rgba(0,0,0,0.08);
            --text: #1d1d1f;
            --text-sub: #6e6e73;
            --blue: #0071e3;
            --green: #1d8348;
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAV */
        nav {
            height: 52px; min-height: 52px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100; flex-shrink: 0;
        }
        .nav-logo { font-size: 0.92rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-logo span { color: var(--blue); }
        .nav-badge { background: #d1fae5; color: #065f46; font-size: 0.68rem; font-weight: 600; padding: 2px 10px; border-radius: 20px; }
        .nav-right { font-size: 0.8rem; color: var(--text-sub); display: flex; align-items: center; gap: 10px; }
        .nav-right button { background: none; border: 1px solid var(--border); padding: 3px 12px; border-radius: 8px; font-size: 0.76rem; cursor: pointer; color: var(--text-sub); font-family: inherit; }

        /* LAYOUT */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 220px; flex-shrink: 0;
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-head {
            padding: 14px 16px 10px;
            font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
            letter-spacing: 0.08em; text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
        .tree-toggle {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 10px; cursor: pointer; user-select: none;
            font-size: 0.78rem; font-weight: 600; color: var(--text);
            transition: background 0.1s;
        }
        .tree-toggle:hover { background: var(--bg); }
        .tree-toggle .t-arrow {
            font-size: 0.55rem; color: var(--text-sub);
            transition: transform 0.18s; flex-shrink: 0; margin-right: 2px;
        }
        .tree-toggle .t-icon { font-size: 0.82rem; flex-shrink: 0; }
        .tree-toggle .t-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-node.open > .tree-toggle .t-arrow { transform: rotate(90deg); }
        .tree-children { display: none; }
        .tree-node.open > .tree-children { display: block; }
        .tree-file {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 10px; cursor: pointer;
            font-size: 0.77rem; color: var(--text-sub);
            transition: background 0.1s, color 0.1s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tree-file:hover { background: var(--bg); color: var(--text); }
        .tree-file .t-icon { font-size: 0.75rem; flex-shrink: 0; }

        /* CHAT AREA */
        .chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .messages {
            flex: 1; overflow-y: auto;
            padding: 1.5rem 1.5rem 1rem;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* Quick prompts */
        .quick-prompts { display: flex; flex-direction: column; gap: 10px; padding: 8px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
        .quick-category { display: flex; flex-direction: column; gap: 6px; }
        .quick-category-label {
            font-size: 0.66rem; font-weight: 700; color: var(--text-sub);
            letter-spacing: 0.06em; text-transform: uppercase;
        }
        .quick-btns-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .quick-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 6px 14px; font-size: 0.78rem;
            cursor: pointer; color: var(--text-sub); font-family: inherit;
            transition: all 0.15s;
        }
        .quick-btn:hover { border-color: var(--green); color: var(--green); background: #f0fdf4; }

        /* Message bubbles */
        .msg { display: flex; flex-direction: column; max-width: 78%; }
        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.assistant { align-self: flex-start; align-items: flex-start; max-width: 94%; }
        .msg.system-msg { align-self: center; align-items: center; max-width: 90%; }

        .bubble {
            padding: 12px 16px; border-radius: 16px;
            font-size: 0.85rem; line-height: 1.6;
        }
        .msg.user .bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble {
            background: var(--surface); border: 1px solid var(--border);
            border-bottom-left-radius: 4px; color: var(--text);
            padding: 18px 22px; line-height: 1.8; font-size: 0.87rem;
        }
        .msg.system-msg .bubble { background: #f0fdf4; border: 1px solid #a7f3d0; color: #065f46; font-size: 0.8rem; text-align: center; }

        /* Markdown styles inside bubble */
        .bubble h1, .bubble h2, .bubble h3 { font-weight: 700; margin: 1.1rem 0 0.5rem; font-size: 1em; }
        .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child { margin-top: 0; }
        .bubble h2 { font-size: 0.95em; }
        .bubble h3 { font-size: 0.9em; color: var(--text-sub); }
        .bubble p { margin-bottom: 0.6rem; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { padding-left: 1.4rem; margin-bottom: 0.6rem; }
        .bubble li { margin-bottom: 0.35rem; }
        .bubble table { border-collapse: collapse; width: 100%; font-size: 0.83em; margin: 0.8rem 0; }
        .bubble th { background: rgba(0,0,0,0.04); font-weight: 600; padding: 7px 12px; border: 1px solid var(--border); text-align: left; }
        .bubble td { padding: 6px 12px; border: 1px solid var(--border); }
        .bubble code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; font-family: monospace; }
        .bubble pre { background: #1d1d1f; color: #a1e3a1; padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
        .bubble pre code { background: none; padding: 0; color: inherit; }
        .bubble strong { font-weight: 700; }
        .bubble hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
        .bubble blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--text-sub); margin: 0.5rem 0; }

        /* Bubble action buttons (copy / download) */
        .bubble-actions { display: flex; gap: 6px; margin-top: 10px; }
        .bubble-action {
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.76rem; font-weight: 500; color: var(--text-sub);
            padding: 5px 12px; cursor: pointer;
            display: flex; align-items: center; gap: 4px;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .bubble-action:hover { background: var(--border); color: var(--text); }
        .bubble-action.copied { color: #34c759; border-color: #34c759; background: #f0fdf4; }

        /* Tool log chips */
        .tool-log { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        .tool-chip {
            font-size: 0.68rem; padding: 2px 8px; border-radius: 10px;
            display: flex; align-items: center; gap: 4px;
        }
        .chip-read  { background: #dbeafe; color: #1e40af; }
        .chip-write { background: #d1fae5; color: #065f46; }
        .chip-list  { background: #f3f4f6; color: #6b7280; }

        /* File update banner */
        .update-banner {
            margin-top: 8px; padding: 7px 12px; border-radius: 10px;
            background: #ecfdf5; border: 1px solid #a7f3d0;
            font-size: 0.75rem; color: #065f46; display: flex; align-items: center; gap: 6px;
        }

        /* Loading */
        .loading-bubble {
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px 16px; border-radius: 16px; border-bottom-left-radius: 4px;
            font-size: 0.82rem; color: var(--text-sub);
            display: flex; align-items: center; gap: 8px;
        }
        .dots span { display: inline-block; animation: blink 1.2s infinite; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

        /* INPUT AREA */
        .input-area {
            border-top: 1px solid var(--border); padding: 12px 16px;
            background: var(--surface); display: flex; gap: 10px; align-items: flex-end;
            flex-shrink: 0;
        }
        #chat-input {
            width: 100%; border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 16px; font-size: 0.88rem; font-family: inherit;
            resize: none; outline: none; max-height: 200px; min-height: 80px;
            line-height: 1.6; color: var(--text);
            transition: border-color 0.15s;
        }
        #chat-input:focus { border-color: var(--blue); }
        #send-btn {
            background: var(--blue); color: white; border: none;
            border-radius: 10px; padding: 10px 18px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: opacity 0.15s; flex-shrink: 0;
        }
        #send-btn:hover { opacity: 0.88; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .input-hint { font-size: 0.7rem; color: var(--text-sub); margin-top: 4px; }

        /* FILE VIEWER MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border-radius: 18px;
            width: min(920px, 94vw); max-height: 85vh;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-head {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .modal-title { font-size: 0.85rem; font-weight: 500; color: var(--text-sub); }
        .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-sub); padding: 0 4px; }
        .modal-action-btn {
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.75rem; font-weight: 500; color: var(--text-sub);
            padding: 4px 10px; cursor: pointer; display: flex; align-items: center; gap: 4px;
            transition: background 0.15s;
        }
        .modal-action-btn:hover { background: var(--border); }
        .modal-action-btn.copied { color: #34c759; border-color: #34c759; }
        .modal-head-actions { display: flex; align-items: center; gap: 8px; }
        .modal-body { flex: 1; overflow-y: auto; padding: 28px 32px; }
        .modal-body pre { font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; line-height: 1.7; white-space: pre-wrap; }
        /* 파일 뷰어 마크다운 테이블 */
        .modal-body table { border-collapse: collapse; width: 100%; font-size: 0.84rem; margin: 0.8rem 0; table-layout: auto; }
        .modal-body th { background: var(--bg); font-weight: 600; padding: 8px 20px 8px 12px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
        .modal-body td { padding: 7px 20px 7px 12px; border: 1px solid var(--border); vertical-align: top; }
        .modal-body td:first-child { white-space: nowrap; color: var(--text-sub); font-size: 0.8rem; }

        /* MEETING MODAL */
        .meeting-form { display: flex; flex-direction: column; gap: 16px; }
        .meeting-form label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; display: block; }
        .meeting-form input[type="text"] {
            width: 100%; border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; font-size: 0.88rem; font-family: inherit;
            outline: none; color: var(--text); box-sizing: border-box;
        }
        .meeting-form input[type="text"]:focus { border-color: var(--blue); }
        .meeting-file-label {
            display: flex; align-items: center; gap: 10px;
            border: 1.5px dashed var(--border); border-radius: 10px;
            padding: 14px 16px; cursor: pointer; font-size: 0.85rem; color: var(--text-sub);
            transition: border-color 0.15s;
        }
        .meeting-file-label:hover { border-color: var(--blue); color: var(--blue); }
        .meeting-file-label.selected { border-color: var(--green); color: var(--green); }
        .meeting-form input[type="file"] { display: none; }
        /* Meeting tabs */
        .meeting-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; gap: 0; }
        .meeting-tab {
            flex: 1; padding: 8px 12px; background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer;
            font-size: 0.82rem; color: var(--text-sub); font-family: inherit; transition: all 0.15s;
        }
        .meeting-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

        .meeting-submit {
            background: var(--blue); color: white; border: none;
            border-radius: 10px; padding: 11px; font-size: 0.88rem;
            font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .meeting-submit:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
</head>

<body>

<nav>
    <div class="nav-logo">
        DOW <span>Valve</span>
        <span class="nav-badge">AI 업무 허브</span>
    </div>
    <div class="nav-right">
        <span id="nav-username">—</span>
        <button onclick="location.href='portal.html'">← 포털</button>
    </div>
</nav>

<div class="layout">
    <!-- 사이드바: 파일 탐색기 -->
    <aside class="sidebar">
        <div class="sidebar-head">파일 탐색기</div>
        <div class="file-tree" id="file-tree">
            <div style="padding:12px 16px;font-size:0.78rem;color:var(--text-sub);">로딩 중...</div>
        </div>
    </aside>

    <!-- 채팅 영역 -->
    <div class="chat-wrap">
        <div class="messages" id="messages">
            <div class="msg system-msg">
                <div class="bubble">
                    안녕하세요. 다우밸브 AI 어시스턴트입니다.<br>
                    자연어로 업무 현황을 묻거나 과제·딜 현황을 업데이트할 수 있습니다.
                </div>
            </div>
        </div>

        <div class="quick-prompts" id="quick-prompts">
            <div class="quick-category">
                <div class="quick-category-label">업무 현황</div>
                <div class="quick-btns-row">
                    <button class="quick-btn" onclick="sendQuick('우리 팀 미결업무 현황 요약해줘')">📋 팀 과제 현황</button>
                    <button class="quick-btn" onclick="sendQuick('이번 주 우리 팀 주간 리포트 보여줘')">📊 주간 리포트</button>
                    <button class="quick-btn" onclick="sendQuick('OKR 현황과 기한 초과 건 알려줘')">🎯 OKR 현황</button>
                    <button class="quick-btn" onclick="sendQuick('이번 주 주의해야 할 건 뭐야?')">⚠️ 주의 건 확인</button>
                </div>
            </div>
            <div class="quick-category">
                <div class="quick-category-label">거래처</div>
                <div class="quick-btns-row">
                    <button class="quick-btn" onclick="sendQuick('거래처 목록 보여줘')">🏢 거래처 조회</button>
                    <button class="quick-btn" onclick="sendQuick('채널별 영업 현황 알려줘')">📈 채널 현황</button>
                </div>
            </div>
            <div class="quick-category">
                <div class="quick-category-label">기록 / 정리</div>
                <div class="quick-btns-row">
                    <button class="quick-btn" onclick="openWorklogModal()">📝 업무 기록</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div style="flex:1;">
                <textarea id="chat-input" placeholder="예: &quot;E-002 선적 완료됐어&quot; / &quot;이번 주 파이프라인 현황 알려줘&quot;" rows="1"></textarea>
            </div>
            <button id="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>
</div>

<!-- 업무 기록 모달 -->
<div class="modal-overlay" id="worklog-modal" onclick="closeWorklogModal(event)">
    <div class="modal" style="width:min(680px,94vw);">
        <div class="modal-head">
            <span class="modal-title" id="worklog-modal-title">📝 업무 기록</span>
            <button class="modal-close" onclick="closeWorklogModal()">✕</button>
        </div>
        <div class="modal-body">
            <!-- Step 1: 입력 -->
            <div id="worklog-step1" class="meeting-form">
                <div class="meeting-tabs">
                    <button class="meeting-tab active" id="worklog-tab-audio-btn" onclick="switchWorklogTab('audio')">🎙 오디오 변환</button>
                    <button class="meeting-tab" id="worklog-tab-text-btn" onclick="switchWorklogTab('text')">📋 텍스트 입력</button>
                </div>
                <!-- 오디오 탭 -->
                <div id="worklog-tab-audio" style="display:flex;flex-direction:column;gap:12px;">
                    <div>
                        <label>녹음 파일 <span style="font-size:0.72rem;color:var(--text-sub);font-weight:400;">(5분 이하 권장)</span></label>
                        <label class="meeting-file-label" id="worklog-file-label" for="worklog-audio">
                            🎙 파일 선택 (mp3, m4a, wav 등)
                        </label>
                        <input type="file" id="worklog-audio" accept="audio/*" onchange="onWorklogAudioSelected(this)" />
                    </div>
                    <button class="meeting-submit" id="worklog-transcribe-btn" onclick="transcribeWorklog()">변환</button>
                </div>
                <!-- 텍스트 입력 탭 -->
                <div id="worklog-tab-text" style="display:none;flex-direction:column;gap:12px;">
                    <div>
                        <label>내용 붙여넣기 <span style="font-size:0.72rem;color:var(--text-sub);font-weight:400;">미팅 메모, 카톡, 메일 등</span></label>
                        <textarea id="worklog-text-input" placeholder="미팅 내용, 카톡, 메일 본문 등을 붙여넣으세요..." style="width:100%;min-height:220px;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:0.82rem;font-family:inherit;line-height:1.7;resize:vertical;box-sizing:border-box;outline:none;"></textarea>
                    </div>
                    <button class="meeting-submit" onclick="submitWorklogText()">다음 →</button>
                </div>
            </div>
            <!-- Step 2: AI 분석 + 검토 -->
            <div id="worklog-step2" style="display:none;" class="meeting-form">
                <div>
                    <label>내용 확인 및 수정</label>
                    <textarea id="worklog-content-edit" style="width:100%;min-height:160px;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:0.82rem;font-family:inherit;line-height:1.7;resize:vertical;box-sizing:border-box;outline:none;"></textarea>
                </div>
                <div>
                    <label>저장 경로</label>
                    <input type="text" id="worklog-filepath" />
                </div>
                <div id="worklog-analysis-loading" style="display:none;text-align:center;padding:20px;color:var(--text-sub);font-size:0.85rem;">
                    <div style="font-size:1.2rem;margin-bottom:6px;">🤖</div>
                    <div>내용 분석 중...</div>
                </div>
                <div id="worklog-analysis-result" style="display:none;background:var(--bg);border-radius:12px;padding:16px;">
                    <div style="font-size:0.75rem;font-weight:600;color:var(--blue);margin-bottom:8px;">AI 분석 결과 — 확인 후 저장하세요</div>
                    <div id="worklog-analysis-text" style="font-size:0.82rem;line-height:1.7;white-space:pre-wrap;color:var(--text);"></div>
                </div>
                <div id="worklog-analysis-error" style="display:none;color:#ff3b30;font-size:0.82rem;padding:10px;background:#fff5f5;border-radius:10px;"></div>
                <div style="display:flex;gap:8px;">
                    <button class="meeting-submit" style="background:var(--text-sub);flex:1;" onclick="backToWorklogStep1()">← 다시</button>
                    <button class="meeting-submit" style="flex:2;" id="worklog-save-btn" onclick="saveWorklog()" disabled>저장 후 실행</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 파일 뷰어 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" id="modal-title">—</span>
            <div class="modal-head-actions">
                <button class="modal-action-btn" id="modal-copy-btn" onclick="copyFileContent()" title="마크다운 원문 복사">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    복사
                </button>
                <button class="modal-action-btn" id="modal-download-btn" onclick="downloadFileContent()" title=".md 파일로 저장">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    다운로드
                </button>
                <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
            </div>
        </div>
        <div class="modal-body">
            <div id="modal-content" style="font-size:0.85rem;line-height:1.7;"></div>
        </div>
    </div>
</div>

<script>
    // ── 접근 제한 + 세션 만료 ──────────────────────────────────────────────────
    (function () {
        const name = localStorage.getItem('attendance_user_name');
        const loginDate = localStorage.getItem('attendance_login_date');
        const today = new Date().toISOString().slice(0, 10);
        if (!name || loginDate !== today) {
            ['attendance_user_name','attendance_user_pin','attendance_user_org','attendance_user_rank','attendance_login_date']
                .forEach(k => localStorage.removeItem(k));
            location.href = 'index.html';
            return;
        }
        const org = localStorage.getItem('attendance_user_org') || '';
        const rank = localStorage.getItem('attendance_user_rank') || '';
        document.getElementById('nav-username').textContent = `${rank} ${name}`.trim();
    })();

    // ── API 인증 토큰 ─────────────────────────────────────────────────────────
    const HUB_TOKEN = 'dH9kR2mN2026';

    // ── marked 설정 ───────────────────────────────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });

    // ── 대화 이력 ──────────────────────────────────────────────────────────────
    let messages = [];
    let isLoading = false;

    // ── 파일 트리 로드 ─────────────────────────────────────────────────────────
    async function loadFileTree() {
        try {
            const res = await fetch('/api/hub-files', { headers: { 'X-Hub-Token': HUB_TOKEN } });
            const data = await res.json();
            renderFileTree(data);
        } catch (e) {
            document.getElementById('file-tree').innerHTML =
                '<div style="padding:12px 16px;font-size:0.78rem;color:#dc2626;">서버 연결 실패</div>';
        }
    }

    const DIR_LABELS = {
        'sales': '영업', 'tasks': '팀별 과제', 'weekly-reports': '주간 리포트',
        'channels': '채널', 'analysis': '영업 분석',
        'companies': '거래처', 'customers': '고객사', 'suppliers': '공급사',
        'contacts': '담당자', 'team': '팀', 'ontology': '온톨로지',
        'project': '프로젝트', 'inbox': 'Inbox'
    };
    const DIR_ICONS = {
        'sales': '📁', 'tasks': '📋', 'weekly-reports': '📅',
        'channels': '📈', 'analysis': '🔍',
        'companies': '📁', 'customers': '🏢', 'suppliers': '🏭',
        'contacts': '👤', 'team': '👥', 'ontology': '📖',
        'project': '🗂️', 'inbox': '📥'
    };
    const TOP_ORDER = ['sales', 'companies', 'team'];
    const HIDDEN_DIRS = new Set(['ontology', 'project', 'inbox']); // AI 내부용·임시 폴더

    function renderNode(name, node, depth) {
        const label = DIR_LABELS[name] || name.replace(/_/g, ' ');
        const icon = DIR_ICONS[name] || (depth === 0 ? '📁' : '📂');
        const indent = depth * 12;
        const subDirs = Object.keys(node).filter(k => k !== '_files').sort();
        const files = node._files || [];

        let html = `<div class="tree-node">
            <div class="tree-toggle" style="padding-left:${10 + indent}px" onclick="toggleNode(this)">
                <span class="t-arrow">▶</span>
                <span class="t-icon">${icon}</span>
                <span class="t-label">${label}</span>
            </div>
            <div class="tree-children">`;
        subDirs.forEach(dir => { html += renderNode(dir, node[dir], depth + 1); });
        files.forEach(file => {
            html += `<div class="tree-file" style="padding-left:${22 + indent + 12}px" onclick="openFile('${file.path}', '${file.name}')">
                <span class="t-icon">📄</span>${file.name}
            </div>`;
        });
        html += `</div></div>`;
        return html;
    }

    function renderFileTree(data) {
        const tree = document.getElementById('file-tree');
        let html = '';
        const rendered = new Set();
        TOP_ORDER.forEach(key => {
            if (data[key] && !HIDDEN_DIRS.has(key)) { html += renderNode(key, data[key], 0); rendered.add(key); }
        });
        Object.keys(data).forEach(key => {
            if (!rendered.has(key) && !HIDDEN_DIRS.has(key)) html += renderNode(key, data[key], 0);
        });
        tree.innerHTML = html || '<div style="padding:12px 16px;font-size:0.78rem;color:var(--text-sub);">파일 없음</div>';
    }

    function toggleNode(el) {
        el.parentElement.classList.toggle('open');
    }

    // ── 파일 뷰어 ──────────────────────────────────────────────────────────────
    let currentFileRaw = '';
    let currentFileName = '';

    async function openFile(filePath, name) {
        currentFileRaw = '';
        currentFileName = name || filePath.split('/').pop();
        document.getElementById('modal-title').textContent = filePath;
        document.getElementById('modal-content').textContent = '로딩 중...';
        document.getElementById('modal-copy-btn').className = 'modal-action-btn';
        document.getElementById('modal-copy-btn').textContent = '';
        document.getElementById('modal-copy-btn').innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사';
        document.getElementById('modal').classList.add('open');
        try {
            const res = await fetch(`/api/hub-file?path=${encodeURIComponent(filePath)}`, { headers: { 'X-Hub-Token': HUB_TOKEN } });
            const data = await res.json();
            currentFileRaw = data.content || '';
            document.getElementById('modal-content').innerHTML = DOMPurify.sanitize(marked.parse(currentFileRaw || '*(빈 파일)*'));
        } catch (e) {
            document.getElementById('modal-content').textContent = '파일 로드 실패: ' + e.message;
        }
    }

    async function copyFileContent() {
        if (!currentFileRaw) return;
        try {
            await navigator.clipboard.writeText(currentFileRaw);
            const btn = document.getElementById('modal-copy-btn');
            btn.classList.add('copied');
            btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg> 복사됨';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사';
            }, 2000);
        } catch (e) {
            alert('클립보드 복사 실패: ' + e.message);
        }
    }

    function downloadFileContent() {
        if (!currentFileRaw) return;
        const blob = new Blob([currentFileRaw], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentFileName.endsWith('.md') ? currentFileName : currentFileName + '.md';
        a.click();
        URL.revokeObjectURL(url);
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modal')) {
            document.getElementById('modal').classList.remove('open');
        }
    }

    // ── 메시지 렌더링 ──────────────────────────────────────────────────────────
    function appendUserMsg(text) {
        const container = document.getElementById('messages');
        const el = document.createElement('div');
        el.className = 'msg user';
        el.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        container.appendChild(el);
        scrollBottom();
    }

    function appendAssistantMsg(text, toolLog, updatedFiles) {
        const container = document.getElementById('messages');
        const el = document.createElement('div');
        el.className = 'msg assistant';

        // 마크다운 렌더링
        let html = `<div class="bubble">${DOMPurify.sanitize(marked.parse(text))}</div>`;

        // Tool log chips
        if (toolLog?.length) {
            const chips = toolLog.map(t => {
                const cls = t.name === 'write_file' ? 'chip-write' : t.name === 'list_files' ? 'chip-list' : 'chip-read';
                const icon = t.name === 'write_file' ? '✏️' : t.name === 'list_files' ? '📁' : '📄';
                const label = t.path || '루트';
                return `<span class="tool-chip ${cls}">${icon} ${label}</span>`;
            }).join('');
            html += `<div class="tool-log">${chips}</div>`;
        }

        // 파일 업데이트 배너
        if (updatedFiles?.length) {
            const files = updatedFiles.join(', ');
            html += `<div class="update-banner">✅ 파일 업데이트됨: <strong>${files}</strong></div>`;
        }

        el.innerHTML = html;

        // 복사 / 다운로드 버튼 (길이 있는 응답에만)
        if (text && text.length > 80) {
            const actionsEl = document.createElement('div');
            actionsEl.className = 'bubble-actions';

            const copyBtn = document.createElement('button');
            copyBtn.className = 'bubble-action';
            copyBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사';
            copyBtn.onclick = async () => {
                try {
                    await navigator.clipboard.writeText(text);
                    copyBtn.classList.add('copied');
                    copyBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg> 복사됨';
                    setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사';
                    }, 2000);
                } catch (e) { alert('복사 실패: ' + e.message); }
            };
            actionsEl.appendChild(copyBtn);

            // 마크다운 헤더가 있으면 다운로드 버튼도 추가
            const heading = text.match(/^#{1,3} (.+)/m)?.[1]?.trim();
            if (heading) {
                const dlBtn = document.createElement('button');
                dlBtn.className = 'bubble-action';
                dlBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 다운로드';
                dlBtn.onclick = () => {
                    const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = heading.replace(/[/\\:*?"<>|]/g, '-') + '.md';
                    a.click();
                    URL.revokeObjectURL(url);
                };
                actionsEl.appendChild(dlBtn);
            }

            el.appendChild(actionsEl);
        }

        container.appendChild(el);
        scrollBottom();

        // 파일 업데이트 있으면 트리 새로고침
        if (updatedFiles?.length) loadFileTree();
    }

    function appendLoading() {
        const container = document.getElementById('messages');
        const el = document.createElement('div');
        el.className = 'msg assistant';
        el.id = 'loading-msg';
        el.innerHTML = `<div class="loading-bubble">
            <div class="dots"><span>●</span><span>●</span><span>●</span></div>
            처리 중...
        </div>`;
        container.appendChild(el);
        scrollBottom();
        return el;
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function scrollBottom() {
        const el = document.getElementById('messages');
        el.scrollTop = el.scrollHeight;
    }

    // ── 메시지 전송 ────────────────────────────────────────────────────────────
    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        // 퀵 프롬프트 숨기기
        input.value = '';
        input.style.height = 'auto';

        appendUserMsg(text);
        messages.push({ role: 'user', content: text });

        // 최근 20개(10턴)만 유지 — 토큰 비용 제한
        if (messages.length > 20) messages = messages.slice(-20);

        const loadingEl = appendLoading();
        isLoading = true;
        document.getElementById('send-btn').disabled = true;

        try {
            const res = await fetch('/api/hub-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Hub-Token': HUB_TOKEN },
                body: JSON.stringify({
                    messages,
                    userName: localStorage.getItem('attendance_user_name') || '직원',
                    userOrg: localStorage.getItem('attendance_user_org') || '',
                    userRank: localStorage.getItem('attendance_user_rank') || ''
                })
            });

            loadingEl.remove();

            if (!res.ok) {
                messages.pop(); // 실패한 사용자 메시지 제거
                const err = await res.json().catch(() => ({ error: '서버 오류' }));
                appendAssistantMsg(`오류가 발생했습니다: ${err.error}`, [], []);
                return;
            }

            const data = await res.json();
            appendAssistantMsg(data.content, data.toolLog, data.updatedFiles);
            messages.push({ role: 'assistant', content: data.content });

        } catch (e) {
            messages.pop(); // 실패한 사용자 메시지 제거
            loadingEl.remove();
            appendAssistantMsg(`서버 연결 오류: ${e.message}`, [], []);
        } finally {
            isLoading = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }
    }

    function sendQuick(text) {
        document.getElementById('chat-input').value = text;
        sendMessage();
    }

    function focusInput(prefix) {
        const input = document.getElementById('chat-input');
        input.value = prefix;
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
    }

    // ── 입력창 자동 높이 ───────────────────────────────────────────────────────
    document.getElementById('chat-input').addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('chat-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ── 업무 기록 모달 ────────────────────────────────────────────────────────
    let worklogActiveTab = 'audio';
    let worklogRawContent = '';

    function openWorklogModal() {
        worklogRawContent = '';
        document.getElementById('worklog-audio').value = '';
        document.getElementById('worklog-text-input').value = '';
        document.getElementById('worklog-file-label').textContent = '🎙 파일 선택 (mp3, m4a, wav 등)';
        document.getElementById('worklog-file-label').classList.remove('selected');
        document.getElementById('worklog-step1').style.display = 'flex';
        document.getElementById('worklog-step2').style.display = 'none';
        document.getElementById('worklog-modal-title').textContent = '📝 업무 기록';
        switchWorklogTab('audio');
        document.getElementById('worklog-modal').classList.add('open');
    }

    function closeWorklogModal(e) {
        if (e && e.target !== document.getElementById('worklog-modal')) return;
        document.getElementById('worklog-modal').classList.remove('open');
    }

    function switchWorklogTab(tab) {
        worklogActiveTab = tab;
        document.getElementById('worklog-tab-audio').style.display = tab === 'audio' ? 'flex' : 'none';
        document.getElementById('worklog-tab-text').style.display = tab === 'text' ? 'flex' : 'none';
        document.getElementById('worklog-tab-audio-btn').classList.toggle('active', tab === 'audio');
        document.getElementById('worklog-tab-text-btn').classList.toggle('active', tab === 'text');
    }

    function onWorklogAudioSelected(input) {
        const label = document.getElementById('worklog-file-label');
        if (input.files[0]) {
            label.textContent = `🎙 ${input.files[0].name}`;
            label.classList.add('selected');
        }
    }

    function resetWorklogStep2() {
        document.getElementById('worklog-analysis-loading').style.display = 'none';
        document.getElementById('worklog-analysis-result').style.display = 'none';
        document.getElementById('worklog-analysis-error').style.display = 'none';
        document.getElementById('worklog-save-btn').disabled = true;
    }

    function backToWorklogStep1() {
        document.getElementById('worklog-step1').style.display = 'flex';
        document.getElementById('worklog-step2').style.display = 'none';
        document.getElementById('worklog-modal-title').textContent = '📝 업무 기록';
        resetWorklogStep2();
    }

    async function showWorklogStep2(content, filePath) {
        worklogRawContent = content;
        document.getElementById('worklog-content-edit').value = content;
        document.getElementById('worklog-filepath').value = filePath;
        document.getElementById('worklog-step1').style.display = 'none';
        document.getElementById('worklog-step2').style.display = 'flex';
        document.getElementById('worklog-modal-title').textContent = '📝 AI 분석 중...';
        resetWorklogStep2();
        document.getElementById('worklog-analysis-loading').style.display = 'block';

        const analyzeMsg = `다음 업무 기록을 분석해줘. 파일 수정은 절대 하지 말고, 분석 결과만 아래 형식으로 알려줘:
**거래처**: (companies/_index.md 대조해서 정확한 명칭, 해당 없으면 "-")
**관련 딜**: (deals.md에서 해당 건명 확인, 없으면 "-")
**현재 단계**: (deals.md 기준 현재 영업 단계, 없으면 "-")
**변경 제안**: (전진이면 → 새 단계, 동일이면 "변화 없음", 역행이면 "⚠️ 역행 감지 — [현재단계] 유지")
**다음 액션**: (기록에서 도출된 액션)
영업 단계 순서: 리드 → 견적요청 → 견적발송 → 협의중 → 수주확정 → 생산/납기 → 출고완료 → 종료
역행은 절대 제안하지 않는다.
--- 업무 기록 ---
${content}`;

        try {
            const res = await fetch('/api/hub-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Hub-Token': HUB_TOKEN },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: analyzeMsg }],
                    userName: localStorage.getItem('attendance_user_name') || '직원',
                    userOrg: localStorage.getItem('attendance_user_org') || '',
                    userRank: localStorage.getItem('attendance_user_rank') || ''
                })
            });
            const data = await res.json();
            document.getElementById('worklog-analysis-loading').style.display = 'none';
            if (data.error) {
                document.getElementById('worklog-analysis-error').style.display = 'block';
                document.getElementById('worklog-analysis-error').textContent = `분석 오류: ${data.error}`;
                document.getElementById('worklog-modal-title').textContent = '📝 내용 확인';
            } else {
                document.getElementById('worklog-analysis-text').textContent = data.content;
                document.getElementById('worklog-analysis-result').style.display = 'block';
                document.getElementById('worklog-modal-title').textContent = '📝 분석 완료 — 저장 확인';
            }
        } catch (e) {
            document.getElementById('worklog-analysis-loading').style.display = 'none';
            document.getElementById('worklog-analysis-error').style.display = 'block';
            document.getElementById('worklog-analysis-error').textContent = `분석 실패: ${e.message}`;
            document.getElementById('worklog-modal-title').textContent = '📝 내용 확인';
        } finally {
            document.getElementById('worklog-save-btn').disabled = false;
        }
    }

    function submitWorklogText() {
        const text = document.getElementById('worklog-text-input').value.trim();
        if (!text) { alert('내용을 입력해주세요.'); return; }
        const today = new Date().toISOString().slice(0, 10);
        const author = localStorage.getItem('attendance_user_name') || '직원';
        const formatted = `# 업무 기록\n날짜: ${today}\n작성자: ${author}\n\n${text}`;
        showWorklogStep2(formatted, `inbox/${today}-${Date.now()}.md`);
    }

    async function transcribeWorklog() {
        const fileInput = document.getElementById('worklog-audio');
        const file = fileInput.files[0];
        if (!file) { alert('녹음 파일을 선택해주세요.'); return; }

        const btn = document.getElementById('worklog-transcribe-btn');
        btn.disabled = true;
        btn.textContent = '변환 중...';

        try {
            const audioBase64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
            const userName = localStorage.getItem('attendance_user_name') || '직원';
            const res = await fetch('/api/hub-stt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Hub-Token': HUB_TOKEN },
                body: JSON.stringify({ audioBase64, mimeType: file.type, company: '', userName })
            });
            const data = await res.json();
            if (data.error) { alert(`변환 오류: ${data.error}`); return; }
            const today = new Date().toISOString().slice(0, 10);
            showWorklogStep2(data.content, data.filePath || `inbox/${today}-${Date.now()}.md`);
        } catch (err) {
            alert(`오류: ${err.message}`);
        } finally {
            btn.disabled = false;
            btn.textContent = '변환';
        }
    }

    async function saveWorklog() {
        const content = document.getElementById('worklog-content-edit').value.trim();
        const filePath = document.getElementById('worklog-filepath').value.trim();
        const userName = localStorage.getItem('attendance_user_name') || '직원';

        const btn = document.getElementById('worklog-save-btn');
        btn.disabled = true;
        btn.textContent = '저장 중...';
        document.getElementById('worklog-modal').classList.remove('open');

        try {
            const res = await fetch('/api/hub-stt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Hub-Token': HUB_TOKEN },
                body: JSON.stringify({ action: 'save', content, filePath, userName })
            });
            const data = await res.json();
            if (data.error) { appendAssistantMsg(`저장 오류: ${data.error}`, [], []); return; }

            const processMsg = `${filePath} 처리해줘`;
            appendUserMsg(processMsg);
            messages.push({ role: 'user', content: processMsg });
            const loadingEl = appendLoading();
            isLoading = true;
            document.getElementById('send-btn').disabled = true;

            const chatRes = await fetch('/api/hub-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Hub-Token': HUB_TOKEN },
                body: JSON.stringify({
                    messages,
                    userName: localStorage.getItem('attendance_user_name') || '직원',
                    userOrg: localStorage.getItem('attendance_user_org') || '',
                    userRank: localStorage.getItem('attendance_user_rank') || ''
                })
            });
            loadingEl.remove();
            const chatData = await chatRes.json();
            appendAssistantMsg(chatData.content, chatData.toolLog, chatData.updatedFiles);
            messages.push({ role: 'assistant', content: chatData.content });
        } catch (err) {
            appendAssistantMsg(`오류: ${err.message}`, [], []);
        } finally {
            btn.disabled = false;
            btn.textContent = '저장 후 실행';
            isLoading = false;
            document.getElementById('send-btn').disabled = false;
        }
    }

    // ── 초기 로드 ──────────────────────────────────────────────────────────────
    loadFileTree();
</script>

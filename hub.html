<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 업무 허브 — DOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: rgba(0,0,0,0.08);
            --text: #1d1d1f;
            --text-sub: #6e6e73;
            --blue: #0071e3;
            --green: #1d8348;
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAV */
        nav {
            height: 52px; min-height: 52px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100; flex-shrink: 0;
        }
        .nav-logo { font-size: 0.92rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-logo span { color: var(--blue); }
        .nav-badge { background: #d1fae5; color: #065f46; font-size: 0.68rem; font-weight: 600; padding: 2px 10px; border-radius: 20px; }
        .nav-right { font-size: 0.8rem; color: var(--text-sub); display: flex; align-items: center; gap: 10px; }
        .nav-right button { background: none; border: 1px solid var(--border); padding: 3px 12px; border-radius: 8px; font-size: 0.76rem; cursor: pointer; color: var(--text-sub); font-family: inherit; }

        /* LAYOUT */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 230px; flex-shrink: 0;
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-head {
            padding: 14px 16px 10px;
            font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
            letter-spacing: 0.08em; text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .file-tree { flex: 1; overflow-y: auto; padding: 8px 0; }
        .tree-section { margin-bottom: 4px; }
        .tree-section-label {
            padding: 5px 16px 3px;
            font-size: 0.68rem; font-weight: 700; color: var(--text-sub);
            letter-spacing: 0.06em; text-transform: uppercase;
        }
        .tree-item {
            padding: 5px 16px 5px 24px;
            font-size: 0.8rem; cursor: pointer; color: var(--text);
            border-radius: 0; transition: background 0.1s;
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tree-item:hover { background: var(--bg); }
        .tree-item .icon { font-size: 0.75rem; opacity: 0.6; flex-shrink: 0; }

        /* CHAT AREA */
        .chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .messages {
            flex: 1; overflow-y: auto;
            padding: 1.5rem 1.5rem 1rem;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* Quick prompts */
        .quick-prompts { display: flex; flex-direction: column; gap: 10px; padding: 8px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
        .quick-category { display: flex; flex-direction: column; gap: 6px; }
        .quick-category-label {
            font-size: 0.66rem; font-weight: 700; color: var(--text-sub);
            letter-spacing: 0.06em; text-transform: uppercase;
        }
        .quick-btns-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .quick-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 6px 14px; font-size: 0.78rem;
            cursor: pointer; color: var(--text-sub); font-family: inherit;
            transition: all 0.15s;
        }
        .quick-btn:hover { border-color: var(--green); color: var(--green); background: #f0fdf4; }

        /* Message bubbles */
        .msg { display: flex; flex-direction: column; max-width: 78%; }
        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.assistant { align-self: flex-start; align-items: flex-start; }
        .msg.system-msg { align-self: center; align-items: center; max-width: 90%; }

        .bubble {
            padding: 12px 16px; border-radius: 16px;
            font-size: 0.85rem; line-height: 1.6;
        }
        .msg.user .bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble {
            background: var(--surface); border: 1px solid var(--border);
            border-bottom-left-radius: 4px; color: var(--text);
        }
        .msg.system-msg .bubble { background: #f0fdf4; border: 1px solid #a7f3d0; color: #065f46; font-size: 0.8rem; text-align: center; }

        /* Markdown styles inside bubble */
        .bubble h1, .bubble h2, .bubble h3 { font-weight: 700; margin: 0.8rem 0 0.4rem; font-size: 1em; }
        .bubble h2 { font-size: 0.95em; }
        .bubble h3 { font-size: 0.9em; color: var(--text-sub); }
        .bubble p { margin-bottom: 0.5rem; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { padding-left: 1.2rem; margin-bottom: 0.5rem; }
        .bubble li { margin-bottom: 0.2rem; }
        .bubble table { border-collapse: collapse; width: 100%; font-size: 0.82em; margin: 0.6rem 0; }
        .bubble th { background: rgba(0,0,0,0.04); font-weight: 600; padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
        .bubble td { padding: 5px 10px; border: 1px solid var(--border); }
        .bubble code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; font-family: monospace; }
        .bubble pre { background: #1d1d1f; color: #a1e3a1; padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
        .bubble pre code { background: none; padding: 0; color: inherit; }
        .bubble strong { font-weight: 700; }
        .bubble hr { border: none; border-top: 1px solid var(--border); margin: 0.8rem 0; }
        .bubble blockquote { border-left: 3px solid var(--border); padding-left: 10px; color: var(--text-sub); margin: 0.4rem 0; }

        /* Tool log chips */
        .tool-log { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        .tool-chip {
            font-size: 0.68rem; padding: 2px 8px; border-radius: 10px;
            display: flex; align-items: center; gap: 4px;
        }
        .chip-read  { background: #dbeafe; color: #1e40af; }
        .chip-write { background: #d1fae5; color: #065f46; }
        .chip-list  { background: #f3f4f6; color: #6b7280; }

        /* File update banner */
        .update-banner {
            margin-top: 8px; padding: 7px 12px; border-radius: 10px;
            background: #ecfdf5; border: 1px solid #a7f3d0;
            font-size: 0.75rem; color: #065f46; display: flex; align-items: center; gap: 6px;
        }

        /* Loading */
        .loading-bubble {
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px 16px; border-radius: 16px; border-bottom-left-radius: 4px;
            font-size: 0.82rem; color: var(--text-sub);
            display: flex; align-items: center; gap: 8px;
        }
        .dots span { display: inline-block; animation: blink 1.2s infinite; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

        /* INPUT AREA */
        .input-area {
            border-top: 1px solid var(--border); padding: 12px 16px;
            background: var(--surface); display: flex; gap: 10px; align-items: flex-end;
            flex-shrink: 0;
        }
        #chat-input {
            width: 100%; border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 16px; font-size: 0.88rem; font-family: inherit;
            resize: none; outline: none; max-height: 200px; min-height: 80px;
            line-height: 1.6; color: var(--text);
            transition: border-color 0.15s;
        }
        #chat-input:focus { border-color: var(--blue); }
        #send-btn {
            background: var(--blue); color: white; border: none;
            border-radius: 10px; padding: 10px 18px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: opacity 0.15s; flex-shrink: 0;
        }
        #send-btn:hover { opacity: 0.88; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .input-hint { font-size: 0.7rem; color: var(--text-sub); margin-top: 4px; }

        /* FILE VIEWER MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border-radius: 18px;
            width: min(720px, 92vw); max-height: 80vh;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-head {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .modal-title { font-size: 0.88rem; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-sub); padding: 0 4px; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        .modal-body pre { font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; line-height: 1.7; white-space: pre-wrap; }

        /* MEETING MODAL */
        .meeting-form { display: flex; flex-direction: column; gap: 16px; }
        .meeting-form label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; display: block; }
        .meeting-form input[type="text"] {
            width: 100%; border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; font-size: 0.88rem; font-family: inherit;
            outline: none; color: var(--text); box-sizing: border-box;
        }
        .meeting-form input[type="text"]:focus { border-color: var(--blue); }
        .meeting-file-label {
            display: flex; align-items: center; gap: 10px;
            border: 1.5px dashed var(--border); border-radius: 10px;
            padding: 14px 16px; cursor: pointer; font-size: 0.85rem; color: var(--text-sub);
            transition: border-color 0.15s;
        }
        .meeting-file-label:hover { border-color: var(--blue); color: var(--blue); }
        .meeting-file-label.selected { border-color: var(--green); color: var(--green); }
        .meeting-form input[type="file"] { display: none; }
        .meeting-submit {
            background: var(--blue); color: white; border: none;
            border-radius: 10px; padding: 11px; font-size: 0.88rem;
            font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .meeting-submit:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
</head>

<body>

<nav>
    <div class="nav-logo">
        DOW <span>Valve</span>
        <span class="nav-badge">AI 업무 허브</span>
    </div>
    <div class="nav-right">
        <span id="nav-username">—</span>
        <button onclick="location.href='portal.html'">← 포털</button>
    </div>
</nav>

<div class="layout">
    <!-- 사이드바: 파일 탐색기 -->
    <aside class="sidebar">
        <div class="sidebar-head">파일 탐색기</div>
        <div class="file-tree" id="file-tree">
            <div style="padding:12px 16px;font-size:0.78rem;color:var(--text-sub);">로딩 중...</div>
        </div>
    </aside>

    <!-- 채팅 영역 -->
    <div class="chat-wrap">
        <div class="messages" id="messages">
            <div class="msg system-msg">
                <div class="bubble">
                    안녕하세요. 다우밸브 AI 어시스턴트입니다.<br>
                    자연어로 업무 현황을 묻거나 파이프라인을 업데이트할 수 있습니다.
                </div>
            </div>
        </div>

        <div class="quick-prompts" id="quick-prompts">
            <div class="quick-category">
                <div class="quick-category-label">업무 현황</div>
                <div class="quick-btns-row">
                    <button class="quick-btn" onclick="sendQuick('파이프라인 현황 요약해줘')">📊 파이프라인 현황</button>
                    <button class="quick-btn" onclick="sendQuick('이번 주 주간 리포트 새로 작성해줘')">📋 주간 리포트</button>
                    <button class="quick-btn" onclick="sendQuick('OKR 현황과 기한 초과 건 알려줘')">🎯 OKR 현황</button>
                    <button class="quick-btn" onclick="sendQuick('이번 주 주의해야 할 건 뭐야?')">⚠️ 주의 건 확인</button>
                </div>
            </div>
            <div class="quick-category">
                <div class="quick-category-label">거래처</div>
                <div class="quick-btns-row">
                    <button class="quick-btn" onclick="sendQuick('거래처 목록 보여줘')">🏢 거래처 조회</button>
                    <button class="quick-btn" onclick="openMeetingModal()">📝 미팅 기록</button>
                </div>
            </div>
            <div class="quick-category">
                <div class="quick-category-label">기록 / 정리</div>
                <div class="quick-btns-row">
                    <button class="quick-btn" onclick="sendQuick('inbox 처리해줘')">📥 inbox 처리</button>
                    <button class="quick-btn" onclick="sendQuick('채널별 영업 현황 알려줘')">📈 채널 현황</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div style="flex:1;">
                <textarea id="chat-input" placeholder="예: &quot;E-002 선적 완료됐어&quot; / &quot;이번 주 파이프라인 현황 알려줘&quot;" rows="1"></textarea>
            </div>
            <button id="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>
</div>

<!-- 미팅 기록 모달 -->
<div class="modal-overlay" id="meeting-modal" onclick="closeMeetingModal(event)">
    <div class="modal" style="width:min(680px,94vw);">
        <div class="modal-head">
            <span class="modal-title" id="meeting-modal-title">📝 미팅 기록</span>
            <button class="modal-close" onclick="closeMeetingModal()">✕</button>
        </div>
        <div class="modal-body">
            <!-- Step 1: 입력 -->
            <div id="meeting-step1" class="meeting-form">
                <div>
                    <label>거래처명</label>
                    <input type="text" id="meeting-company" placeholder="예: HPRAY, Tema Oil Refinery" />
                </div>
                <div>
                    <label>녹음 파일</label>
                    <label class="meeting-file-label" id="meeting-file-label" for="meeting-audio">
                        🎙 파일 선택 (mp3, m4a, wav 등)
                    </label>
                    <input type="file" id="meeting-audio" accept="audio/*" onchange="onAudioSelected(this)" />
                </div>
                <button class="meeting-submit" id="meeting-transcribe-btn" onclick="transcribeMeeting()">변환</button>
            </div>
            <!-- Step 2: 검토 및 수정 -->
            <div id="meeting-step2" style="display:none;" class="meeting-form">
                <div>
                    <label>저장 경로</label>
                    <input type="text" id="meeting-filepath" />
                </div>
                <div>
                    <label>내용 확인 및 수정</label>
                    <textarea id="meeting-content-edit" style="width:100%;min-height:280px;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:0.82rem;font-family:inherit;line-height:1.7;resize:vertical;box-sizing:border-box;outline:none;"></textarea>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="meeting-submit" style="background:var(--text-sub);flex:1;" onclick="backToStep1()">← 다시</button>
                    <button class="meeting-submit" style="flex:2;" id="meeting-save-btn" onclick="saveMeeting()">저장</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 파일 뷰어 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" id="modal-title">—</span>
            <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
        </div>
        <div class="modal-body">
            <pre id="modal-content"></pre>
        </div>
    </div>
</div>

<script>
    // ── 접근 제한 + 세션 만료 ──────────────────────────────────────────────────
    (function () {
        const name = localStorage.getItem('attendance_user_name');
        const loginDate = localStorage.getItem('attendance_login_date');
        const today = new Date().toISOString().slice(0, 10);
        if (!name || loginDate !== today) {
            ['attendance_user_name','attendance_user_pin','attendance_user_org','attendance_user_rank','attendance_login_date']
                .forEach(k => localStorage.removeItem(k));
            location.href = 'index.html';
            return;
        }
        const org = localStorage.getItem('attendance_user_org') || '';
        const rank = localStorage.getItem('attendance_user_rank') || '';
        document.getElementById('nav-username').textContent = `${rank} ${name}`.trim();
    })();

    // ── marked 설정 ───────────────────────────────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });

    // ── 대화 이력 ──────────────────────────────────────────────────────────────
    let messages = [];
    let isLoading = false;

    // ── 파일 트리 로드 ─────────────────────────────────────────────────────────
    async function loadFileTree() {
        try {
            const res = await fetch('/api/hub-files');
            const data = await res.json();
            renderFileTree(data);
        } catch (e) {
            document.getElementById('file-tree').innerHTML =
                '<div style="padding:12px 16px;font-size:0.78rem;color:#dc2626;">서버 연결 실패</div>';
        }
    }

    const SECTION_LABELS = {
        'sales': '영업',
        'sales/analysis': '영업 분석',
        'sales/channels': '채널',
        'companies/customers': '고객사',
        'companies/suppliers': '공급사',
        'team': '팀',
        'ontology': '온톨로지',
        'operations/발주': '발주',
        'operations/재고': '재고',
        'operations/입출고': '입출고',
        'project': '프로젝트',
        'inbox': 'Inbox'
    };

    function renderFileTree(data) {
        const tree = document.getElementById('file-tree');
        const order = ['sales', 'sales/channels', 'sales/analysis', 'companies/customers', 'companies/suppliers', 'team', 'ontology', 'operations/발주', 'operations/재고', 'operations/입출고', 'project', 'inbox'];
        let html = '';

        order.forEach(section => {
            if (!data[section]?.length) return;
            const label = SECTION_LABELS[section] || section;
            html += `<div class="tree-section">
                <div class="tree-section-label">${label}</div>`;
            data[section].forEach(file => {
                html += `<div class="tree-item" onclick="openFile('${file.path}', '${file.name}')">
                    <span class="icon">📄</span>${file.name}
                </div>`;
            });
            html += `</div>`;
        });

        // 나머지 섹션
        Object.keys(data).forEach(section => {
            if (order.includes(section)) return;
            const label = SECTION_LABELS[section] || section;
            html += `<div class="tree-section">
                <div class="tree-section-label">${label}</div>`;
            data[section].forEach(file => {
                html += `<div class="tree-item" onclick="openFile('${file.path}', '${file.name}')">
                    <span class="icon">📄</span>${file.name}
                </div>`;
            });
            html += `</div>`;
        });

        tree.innerHTML = html || '<div style="padding:12px 16px;font-size:0.78rem;color:var(--text-sub);">파일 없음</div>';
    }

    // ── 파일 뷰어 ──────────────────────────────────────────────────────────────
    async function openFile(filePath, name) {
        document.getElementById('modal-title').textContent = filePath;
        document.getElementById('modal-content').textContent = '로딩 중...';
        document.getElementById('modal').classList.add('open');
        try {
            const res = await fetch(`/api/hub-file?path=${encodeURIComponent(filePath)}`);
            const data = await res.json();
            document.getElementById('modal-content').textContent = data.content || '(빈 파일)';
        } catch (e) {
            document.getElementById('modal-content').textContent = '파일 로드 실패: ' + e.message;
        }
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modal')) {
            document.getElementById('modal').classList.remove('open');
        }
    }

    // ── 메시지 렌더링 ──────────────────────────────────────────────────────────
    function appendUserMsg(text) {
        const container = document.getElementById('messages');
        const el = document.createElement('div');
        el.className = 'msg user';
        el.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        container.appendChild(el);
        scrollBottom();
    }

    function appendAssistantMsg(text, toolLog, updatedFiles) {
        const container = document.getElementById('messages');
        const el = document.createElement('div');
        el.className = 'msg assistant';

        // 마크다운 렌더링
        let html = `<div class="bubble">${marked.parse(text)}</div>`;

        // Tool log chips
        if (toolLog?.length) {
            const chips = toolLog.map(t => {
                const cls = t.name === 'write_file' ? 'chip-write' : t.name === 'list_files' ? 'chip-list' : 'chip-read';
                const icon = t.name === 'write_file' ? '✏️' : t.name === 'list_files' ? '📁' : '📄';
                const label = t.path || '루트';
                return `<span class="tool-chip ${cls}">${icon} ${label}</span>`;
            }).join('');
            html += `<div class="tool-log">${chips}</div>`;
        }

        // 파일 업데이트 배너
        if (updatedFiles?.length) {
            const files = updatedFiles.join(', ');
            html += `<div class="update-banner">✅ 파일 업데이트됨: <strong>${files}</strong></div>`;
        }

        el.innerHTML = html;
        container.appendChild(el);
        scrollBottom();

        // 파일 업데이트 있으면 트리 새로고침
        if (updatedFiles?.length) loadFileTree();
    }

    function appendLoading() {
        const container = document.getElementById('messages');
        const el = document.createElement('div');
        el.className = 'msg assistant';
        el.id = 'loading-msg';
        el.innerHTML = `<div class="loading-bubble">
            <div class="dots"><span>●</span><span>●</span><span>●</span></div>
            처리 중...
        </div>`;
        container.appendChild(el);
        scrollBottom();
        return el;
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function scrollBottom() {
        const el = document.getElementById('messages');
        el.scrollTop = el.scrollHeight;
    }

    // ── 메시지 전송 ────────────────────────────────────────────────────────────
    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        // 퀵 프롬프트 숨기기
        input.value = '';
        input.style.height = 'auto';

        appendUserMsg(text);
        messages.push({ role: 'user', content: text });

        const loadingEl = appendLoading();
        isLoading = true;
        document.getElementById('send-btn').disabled = true;

        try {
            const res = await fetch('/api/hub-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages,
                    userName: localStorage.getItem('attendance_user_name') || '직원',
                    userOrg: localStorage.getItem('attendance_user_org') || '',
                    userRank: localStorage.getItem('attendance_user_rank') || ''
                })
            });

            loadingEl.remove();

            if (!res.ok) {
                const err = await res.json();
                appendAssistantMsg(`오류가 발생했습니다: ${err.error}`, [], []);
                return;
            }

            const data = await res.json();
            appendAssistantMsg(data.content, data.toolLog, data.updatedFiles);
            messages.push({ role: 'assistant', content: data.content });

        } catch (e) {
            loadingEl.remove();
            appendAssistantMsg(`서버 연결 오류: ${e.message}\n\n서버가 실행 중인지 확인하세요.`, [], []);
        } finally {
            isLoading = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }
    }

    function sendQuick(text) {
        document.getElementById('chat-input').value = text;
        sendMessage();
    }

    function focusInput(prefix) {
        const input = document.getElementById('chat-input');
        input.value = prefix;
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
    }

    // ── 입력창 자동 높이 ───────────────────────────────────────────────────────
    document.getElementById('chat-input').addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('chat-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ── 미팅 기록 모달 ────────────────────────────────────────────────────────
    let meetingUserMsg = '';

    function openMeetingModal() {
        document.getElementById('meeting-company').value = '';
        document.getElementById('meeting-audio').value = '';
        document.getElementById('meeting-file-label').textContent = '🎙 파일 선택 (mp3, m4a, wav 등)';
        document.getElementById('meeting-file-label').classList.remove('selected');
        document.getElementById('meeting-step1').style.display = 'flex';
        document.getElementById('meeting-step2').style.display = 'none';
        document.getElementById('meeting-modal-title').textContent = '📝 미팅 기록';
        document.getElementById('meeting-modal').classList.add('open');
    }

    function closeMeetingModal(e) {
        if (e && e.target !== document.getElementById('meeting-modal')) return;
        document.getElementById('meeting-modal').classList.remove('open');
    }

    function backToStep1() {
        document.getElementById('meeting-step1').style.display = 'flex';
        document.getElementById('meeting-step2').style.display = 'none';
        document.getElementById('meeting-modal-title').textContent = '📝 미팅 기록';
    }

    function onAudioSelected(input) {
        const label = document.getElementById('meeting-file-label');
        if (input.files[0]) {
            label.textContent = `🎙 ${input.files[0].name}`;
            label.classList.add('selected');
        }
    }

    async function transcribeMeeting() {
        const company = document.getElementById('meeting-company').value.trim();
        const fileInput = document.getElementById('meeting-audio');
        const file = fileInput.files[0];

        if (!company) { alert('거래처명을 입력해주세요.'); return; }
        if (!file) { alert('녹음 파일을 선택해주세요.'); return; }

        const btn = document.getElementById('meeting-transcribe-btn');
        btn.disabled = true;
        btn.textContent = '변환 중...';

        meetingUserMsg = `미팅 기록 — ${company} (${file.name})`;

        try {
            const audioBase64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            const userName = localStorage.getItem('attendance_user_name') || '직원';
            const res = await fetch('/api/hub-stt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ audioBase64, mimeType: file.type, company, userName })
            });
            const data = await res.json();

            if (data.error) {
                alert(`변환 오류: ${data.error}`);
            } else {
                document.getElementById('meeting-content-edit').value = data.content;
                document.getElementById('meeting-filepath').value = data.filePath;
                document.getElementById('meeting-step1').style.display = 'none';
                document.getElementById('meeting-step2').style.display = 'flex';
                document.getElementById('meeting-modal-title').textContent = '📝 내용 확인 및 수정';
            }
        } catch (err) {
            alert(`오류: ${err.message}`);
        } finally {
            btn.disabled = false;
            btn.textContent = '변환';
        }
    }

    async function saveMeeting() {
        const content = document.getElementById('meeting-content-edit').value.trim();
        const filePath = document.getElementById('meeting-filepath').value.trim();
        const userName = localStorage.getItem('attendance_user_name') || '직원';

        const btn = document.getElementById('meeting-save-btn');
        btn.disabled = true;
        btn.textContent = '저장 중...';

        document.getElementById('meeting-modal').classList.remove('open');
        appendUserMsg(meetingUserMsg);
        const loadingEl = appendLoading();

        try {
            const res = await fetch('/api/hub-stt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'save', content, filePath, userName })
            });
            const data = await res.json();

            loadingEl.remove();
            if (data.error) {
                appendAssistantMsg(`저장 오류: ${data.error}`, [], []);
            } else {
                appendAssistantMsg(content, [{ name: 'write_file', path: filePath }], [filePath]);
            }
        } catch (err) {
            loadingEl.remove();
            appendAssistantMsg(`오류: ${err.message}`, [], []);
        } finally {
            btn.disabled = false;
            btn.textContent = '저장';
        }
    }

    // ── 초기 로드 ──────────────────────────────────────────────────────────────
    loadFileTree();
</script>
</body>
</html>

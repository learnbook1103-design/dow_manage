                    '': 99 // м§Ғкёү ?ҶмқҢ

                                    } else if (typeof cell === 'number') {
                                        // ?‘м? ? м§ң ?јл ЁлІҲнҳё (1900??кё°м? ? м§ң) ?Җ??2000??2050???¬мқҙк°?                                        if (cell > 36000 && cell < 60000) {

                                            if (s.match(/л¶Җ??м°ЁмһҘ|кіјмһҘ|?ҖлҰ??¬мӣҗ|мЈјмһ„|? мһ„|мұ…мһ„|?ҳм„қ|?Җ???ҙмӮ¬/)) {
                                                rankVal = s;
                                            }
                                        }
                                    });

                                    if (dateCandidates.length > 0) {

                                        if (joinVal) existingInput.joinDate = joinVal;
                                        if (leaveVal) existingInput.leaveDate = leaveVal;

            function normalizeRows(rawData) {
                if (!rawData || rawData.length === 0) return rawData;

                const firstRow = rawData[0];
                const headers = Object.keys(firstRow);

                // [NEW] лЎңк·ё ?•нғң???°мқҙ??мІҳлҰ¬ (л°ңмғқ?ңк°Ғ, ?ҙлҰ„ кё°л°ҳ)
                if (headers.includes('л°ңмғқ?ңк°Ғ') && !headers.includes('м¶ңк·ј')) {
                    const results = [];
                    rawData.forEach(row => {
                        const name = normalizeName(row['?ҙлҰ„']);
                        const fullTime = String(row['л°ңмғқ?ңк°Ғ'] || "").trim();
                        const shift = String(row['к·јл¬ҙмЎ?] || "").trim();
                        const status = String(row['?Ғнғң'] || "").trim(); // ?Ғнғң ?•мқё

                        if (!name || !fullTime) return;

                        const [date, time] = fullTime.split(' ');
                        if (date && time) {
                            let inTimeParam = "";
                            let outTimeParam = "";

                            if (status.includes('?ҙк·ј')) {
                                outTimeParam = time;
                            } else if (status.includes('м¶ңк·ј')) {
                                inTimeParam = time;
                            } else if (status.includes('м¶ңмһ…') || status.includes('??)) {
                                inTimeParam = time;
                            } else if (status.includes('??)) {
                                outTimeParam = time;
                            } else {
                                inTimeParam = time;
                            }

                            results.push({
                                '? м§ң': date,
                                '?ҙлҰ„': name,
                                'м¶ңк·ј': inTimeParam,
                                '?ҙк·ј': outTimeParam,
                                'к·јл¬ҙмЎ?: shift
                            });
                        }
                    });
                    return results;
                }

                // кё°мЎҙ ??кё°л°ҳ ?°мқҙ??мІҳлҰ¬ (Matrix Style)
                const canonicalMap = {};
                const findAndMap = (canonical, tests) => {
                    const found = tests.find(t => headers.some(h => t(h)));
                    if (found) {
                        const src = headers.find(h => found(h));
                        if (src && src !== canonical) canonicalMap[src] = canonical;
                    }
                };

                findAndMap('? м§ң', [h => h === '? м§ң', h => h.includes('? м§ң') || h.includes('?јмһҗ')]);
                findAndMap('?ҙлҰ„', [h => h === '?ҙлҰ„', h => h.includes('?ҙлҰ„') || h.includes('?ұлӘ…') || h.includes('?¬мӣҗлӘ?)]);
                findAndMap('м¶ңк·ј', [h => h === 'м¶ңк·ј', h => h === 'м¶?, h => h.includes('м¶ңк·ј') && (h.includes('?ңк°„') || h.includes('?ңк°Ғ')), h => h.includes('м¶ңмһ…')]);
                findAndMap('?ҙк·ј', [h => h === '?ҙк·ј', h => h === '??, h => h.includes('?ҙк·ј') && (h.includes('?ңк°„') || h.includes('?ңк°Ғ'))]);
                findAndMap('к·јл¬ҙмЎ?, [h => h === 'к·јл¬ҙмЎ?, h => h.includes('к·јл¬ҙмЎ?), h => h === 'мЎ?]);

                // [?ҳм •] л№„кі (?¬мң ) м»¬лҹј?Җ ?¬лҹ¬ кі?л¶Җ?? ?Ҳмҷё ???җм„ң ?№м • ?ӨмӣҢ?ңл§Ң м¶”м¶ң
                const reasonHeaders = headers.filter(h => ['л№„кі ', 'л¶Җ??, '?Ҳмҷё', '?¬мң '].some(k => h.includes(k)));

                return rawData.map(row => {
                    const newRow = Object.assign({}, row);
                    Object.entries(canonicalMap).forEach(([src, dst]) => {
                        if (src in newRow && !(dst in newRow)) newRow[dst] = newRow[src];
                    });

                    // [м¶”к?] к·јл¬ҙмЎ??•ліҙ ?•к·ң??(м¶ңк·ј ?ңк°„л§??ҲлҠ” кІҪмҡ° +9?ңк°„)
                    if (newRow['к·јл¬ҙмЎ?]) {
                        newRow['к·јл¬ҙмЎ?] = expandShift(newRow['к·јл¬ҙмЎ?]);
                    }

                    // [м¶”к?] ?№м • ?ӨмӣҢ???ёк·ј, мЎ°нҮҙ, ?қмқј??л§?м¶”м¶ң?ҳм—¬ л№„кі лЎ??өн•©
                    let combinedReason = "";
                    const targetKeywords = [
                        { key: '?ёк·ј', label: '?ёк·ј' },
                        { key: '?қмқј??, label: '?қмқј' }
                    ];

                    reasonHeaders.forEach(h => {
                        const val = String(newRow[h] || "");
                        targetKeywords.forEach(t => {
                            if (val.includes(t.key) && !combinedReason.includes(t.label)) {
                                if (combinedReason) combinedReason += ", ";
                                combinedReason += t.label;
                            }
                        });
                    });
                    newRow['л№„кі '] = combinedReason;

                    return newRow;
                });
            }

            function handleLeaveFiles(files) {
                let loadedCount = 0;
                const fileArray = Array.from(files);
                fileArray.forEach(file => {
                    if (!file.name.match(/\.(xlsx|xls|csv)$/)) {
                        loadedCount++;
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];

                        // [Fix]: ?‘м? ?ҙмһҘ !ref лІ”мң„к°Җ ?ҳлӘ»?ҳм–ҙ(?? A5:K96) ?ҒлӢЁ ?ӨлҚ”к°Җ л¬ҙмӢң?ҳлҠ” ?„мғҒ л°©м?. л¬ҙмЎ°кұ?A1л¶Җ???ҪлҸ„лЎ?к°•м ң лІ”мң„лҘ?м§Җ?•н•©?ҲлӢӨ.
                        let range = sheet['!ref'];
                        if (range) {
                            const parts = range.split(':');
                            if (parts.length === 2) {
                                // к°•м ңлЎ?A1л¶Җ???ңмһ‘?ҳлҸ„лЎ??ҳм •
                                range = 'A1:' + parts[1];
                            }
                        }

                        // header: 1лЎ?к°Җ?ём? ?ӨлҚ”к°Җ л°ҖлҰ¬кұ°???ҶлҠ” кІҪмҡ°?җлҸ„ ? м—°?ҳкІҢ ?ҖмІ?                        const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", range: range || undefined });

                        // 1. ?ӨлҚ” ??м°ҫкё° (?Ғмң„ 10к°????Җ??
                        let bestHeaderIdx = -1;
                        let maxMatches = 0; // мөңмҶҢ 1к°??ҙмғҒ ?ӨмӣҢ?ңк? ?Ҳм–ҙ???ӨлҚ”лЎ??ём •
                        const keyKeywords = ['?ҙлҰ„', '?ұлӘ…', '?ңмһ‘', 'мў…лЈҢ', '?Ғнғң', 'кІ°мһ¬'];

                        for (let i = 0; i < Math.min(10, rawData.length); i++) {
                            const row = rawData[i];
                            if (!Array.isArray(row)) continue;
                            const matches = row.filter(v => keyKeywords.some(k => String(v).includes(k))).length;
                            if (matches > maxMatches) {
                                maxMatches = matches;
                                bestHeaderIdx = i;
                            }
                        }
                        const headerRow = bestHeaderIdx !== -1 ? rawData[bestHeaderIdx] : [];
                        const findColIndex = (keywords) => headerRow.findIndex(v => keywords.some(k => String(v).includes(k)));

                        const nameIdx = findColIndex(['?ҙлҰ„', '?ұлӘ…', '?¬мӣҗлӘ?]);

                            localStorage.setItem('employeeExplanations', JSON.stringify(employeeExplanations));
                            updateAndProcessData();
                            verifyBtn.click();
                            alert(`${updateCount}кұҙмқҳ ?ҢлӘ… ?өл????ұкіө?ҒмңјлЎ?к°Җ?ёмҷ”?өлӢҲ??\n(кІҖмҰ?м°Ҫмқҳ 'м§Ғмӣҗ ?ҢлӘ…' ?ҙм—җ???•мқё к°Җ?Ҙн•©?ҲлӢӨ)`);
                        } else {
                            alert('к°Җ?ёмҳ¬ ?ҲлЎң???ҢлӘ… ?өл????ҶмҠө?ҲлӢӨ.');
                        }
                    };
                }

                const resetAllDataBtn = document.getElementById('reset-all-data-btn');
                if (resetAllDataBtn) {
                    resetAllDataBtn.onclick = () => {
                        if (!confirm('мЈјмқҳ: лӘЁл“  ?ҳлҸҷ ?•мқё ?ҙм—ӯ, ?¬мң , м§Ғмӣҗ ?ҢлӘ… ?өл? л°??„мҶЎ ?Ғнғң кё°лЎқ???? ң?©лӢҲ?? ?•л§җ мҙҲкё°?”н•ҳ?ңкІ ?өлӢҲк№?')) return;

                        manualCorrections = {};
                        manualReasons = {};
                        employeeExplanations = {};
                        sentAnomalyKeys.clear();
                        manualEarlyPunches = {};

                        localStorage.removeItem('manualCorrections');
                        localStorage.removeItem('manualReasons');
                        localStorage.removeItem('employeeExplanations');
                        localStorage.removeItem('sentAnomalyKeys');
                        localStorage.removeItem('manualEarlyPunches');

                        updateAndProcessData();
                        verifyBtn.click();
                        alert('лӘЁл“  ?°мқҙ?°к? мҙҲкё°?”лҗҳ?ҲмҠө?ҲлӢӨ.');
                    };
                }

                verifyBtn.addEventListener('click', () => {
                    const combinedData = [];
                    attendanceFilesMap.forEach(data => combinedData.push(...data));

                    if (combinedData.length === 0) {
                        alert('?°мқҙ?°л? лЁјм? ?…лЎң?ңн•ҙмЈјм„ё??');
                        return;
                    }

                    const anomalies = calculateAnomalies(combinedData, { employeeConfigList, manualEarlyPunches, manualReasons, currentLeaveData, currentUniqueDates });
                    const mode = groupSelect ? groupSelect.value : 'none';

                    verifyTbody.innerHTML = '';
                    if (allCheckbox) allCheckbox.checked = false;

                    if (anomalies.length === 0) {
                        verifyTbody.parentElement.classList.add('hidden');
                        verifyEmptyMsg.classList.remove('hidden');
                    } else {
                        verifyTbody.parentElement.classList.remove('hidden');
                        verifyEmptyMsg.classList.add('hidden');

                        // ?°мқҙ??к·ёлЈ№??                        let groupedAnomalies = [];
                        if (mode === 'none') {
                            groupedAnomalies = [{ groupTitle: null, items: anomalies.sort((a, b) => a.date.localeCompare(b.date) || a.name.localeCompare(b.name)) }];
                        } else {
                            const map = {};
                            anomalies.forEach(a => {
                                let gKey = "";
                                if (mode === 'date') gKey = a.date;
                                else if (mode === 'name') gKey = a.name;
                                else if (mode === 'reason') gKey = a.reason.replace(/\s*\(.*\)/, '').trim();

                                if (!map[gKey]) map[gKey] = [];
                                map[gKey].push(a);
                            });
                            Object.keys(map).sort().forEach(k => {
                                groupedAnomalies.push({ groupTitle: k, items: map[k] });
                            });
                        }

                        groupedAnomalies.forEach(group => {
                            const groupId = group.groupTitle ? `group-${group.groupTitle.replace(/\s+/g, '-')}` : null;
                            if (group.groupTitle) {
                                const groupHeader = document.createElement('tr');
                                groupHeader.className = 'verify-group-header';
                                groupHeader.style.backgroundColor = '#f3f4f6';
                                groupHeader.style.fontWeight = 'bold';
                                groupHeader.style.cursor = 'pointer';
                                const isGroupFolded = foldedGroups.has(group.groupTitle);
                                groupHeader.innerHTML = `
                                    <td style="padding: 8px;"><input type="checkbox" class="group-checkbox" data-group="${group.groupTitle}"></td>
                                    <td colspan="7" style="padding: 8px; font-size: 0.9rem;">
                                        <span class="fold-icon" style="margin-right: 8px;">${isGroupFolded ? '?? : '??}</span>
                                        ${group.groupTitle} (${group.items.length}кұ?
                                    </td>
                                `;
                                verifyTbody.appendChild(groupHeader);

                                // мІҙнҒ¬л°•мҠӨ ?ҙлҰӯ?ңлҠ” ?„нҢҢ мӨ‘м? (?ҙл”© л°©м?)
                                groupHeader.querySelector('.group-checkbox').onclick = (e) => e.stopPropagation();
                                groupHeader.querySelector('.group-checkbox').onchange = (e) => {
                                    const isChecked = e.target.checked;
                                    const rowCbs = verifyTbody.querySelectorAll(`.row-checkbox[data-group="${group.groupTitle}"]`);
                                    rowCbs.forEach(cb => {
                                        cb.checked = isChecked;
                                        const k = cb.getAttribute('data-key');
                                        if (isChecked) selectedAnomalyKeys.add(k);
                                        else selectedAnomalyKeys.delete(k);
                                    });
                                };

                                // ?ӨлҚ” ?ҙлҰӯ???ҙл”© ? к?
                                groupHeader.onclick = () => {
                                    const icon = groupHeader.querySelector('.fold-icon');
                                    const isNowExpanding = icon.textContent === '??;
                                    icon.textContent = isNowExpanding ? '?? : '??;

                                    if (isNowExpanding) foldedGroups.delete(group.groupTitle);
                                    else foldedGroups.add(group.groupTitle);

                                    const rows = verifyTbody.querySelectorAll(`tr[data-group-row="${group.groupTitle}"]`);
                                    rows.forEach(r => r.style.display = isNowExpanding ? '' : 'none');
                                };
                            }

                            group.items.forEach(a => {
                                const tr = document.createElement('tr');
                                const corrKey = `${a.name}_${a.originalDate || a.date}`;

                                if (!manualCorrections[corrKey] || typeof manualCorrections[corrKey] !== 'object') {
                                    manualCorrections[corrKey] = (manualCorrections[corrKey] === true) ? { in: true, out: true, leave: true } : { in: false, out: false, leave: false };
                                }
                                const corrData = manualCorrections[corrKey];
                                const hasInAnom = a.inAnom;
                                const hasOutAnom = a.outAnom;
                                const isPendingLeave = a.reason.includes("?№мқё?Җкё?);

                                const isFullyConfirmed = (hasInAnom ? corrData.in : true) && (hasOutAnom ? corrData.out : true) && (isPendingLeave ? corrData.leave : true);
                                const isPartiallyConfirmed = (hasInAnom && corrData.in) || (hasOutAnom && corrData.out) || (isPendingLeave && corrData.leave);

                                if (isFullyConfirmed) tr.classList.add('row-confirmed');

                                const isGroupFolded = foldedGroups.has(group.groupTitle);
                                tr.style.display = isGroupFolded ? 'none' : '';
                                tr.setAttribute('data-group-row', group.groupTitle || "");
                                let groupAttr = group.groupTitle ? `data-group="${group.groupTitle}"` : "";

                                tr.innerHTML = `
                                    <td><input type="checkbox" class="row-checkbox" data-key="${corrKey}" ${groupAttr} ${selectedAnomalyKeys.has(corrKey) ? 'checked' : ''}></td>
                                    <td>${a.date}</td>
                                    <td><strong>${a.name}</strong></td>
                                    <td>${a.shift}</td>
                                    <td>${(a.inTime || a.outTime) ? `${a.inTime} ~ ${a.outTime}` : '<span style="color:#999">(кё°лЎқ ?ҶмқҢ)</span>'}</td>
                                    <td class="anomaly-reason" style="${isFullyConfirmed ? '' : 'color:#ef4444'}">${a.reason}</td>
                                    <td class="employee-explanation" style="font-size: 0.82rem; color: #4F46E5; background-color: #f0f4ff; border: 1px solid #e0e7ff; border-radius: 4px; padding: 4px; line-height: 1.2;">
                                        ${employeeExplanations[corrKey] || (sentAnomalyKeys.has(corrKey) ? '<span style="color: #6b7280; font-weight: 500;">???”мІӯ??/span>' : '-')}
                                    </td>
                                    <td>
                                        <input type="text" class="manual-reason-input" 
                                            value="${manualReasons[corrKey] || ''}" 
                                            placeholder="?¬мң  ?…л Ҙ..."
                                            style="width: 100%; padding: 4px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.8rem;"
                                            data-key="${corrKey}">
                                    </td>
                                    <td>
                                        <div class="verify-action-group">
                                            <button class="confirmation-btn ${isPendingLeave ? (corrData.leave ? 'confirmed' : '') : (isFullyConfirmed || isPartiallyConfirmed ? 'confirmed' : '')}" data-key="${corrKey}">
                                                ${isPendingLeave ? (corrData.leave ? '???Ғмҡ©?? : '?Ғмҡ©?ҳкё°') : (isFullyConfirmed ? '???•мқё?? : (isPartiallyConfirmed ? '???јл??•мқё' : 'лҜёнҷ•??))}
                                            </button>
                                            ${a.hasEarly ? `
                                                <select class="early-mode-select" data-key="${corrKey}" style="padding: 4px 6px; border-radius: 4px; border: 1px solid var(--border-color); font-size: 0.8rem; cursor: pointer;">
                                                    <option value="" ${(manualEarlyPunches[corrKey] || "") === "" ? 'selected' : ''}>лҜёмІҳлҰ?/option>
                                                    <option value="shift" ${(manualEarlyPunches[corrKey] || "") === "shift" ? 'selected' : ''}>?„лӮ лЎ?/option>
                                                    <option value="forceIn" ${(manualEarlyPunches[corrKey] || "") === "forceIn" ? 'selected' : ''}>м¶ңк·ј?јлЎң</option>
                                                </select>
                                            ` : ''}
                                        </div>
                                    </td>
                                `;

                                const cb = tr.querySelector('.row-checkbox');
                                cb.onchange = (e) => {
                                    if (e.target.checked) selectedAnomalyKeys.add(corrKey);
                                    else selectedAnomalyKeys.delete(corrKey);
                                };

                                const confirmBtn = tr.querySelector('.confirmation-btn');
                                confirmBtn.onclick = () => {
                                    const key = confirmBtn.getAttribute('data-key');
                                    const wasFullyConfirmed = isFullyConfirmed;

                                    if (isPendingLeave) {
                                        manualCorrections[key].leave = !manualCorrections[key].leave;
                                    } else {
                                        if (wasFullyConfirmed) {
                                            manualCorrections[key].in = false;
                                            manualCorrections[key].out = false;
                                        } else {
                                            if (hasInAnom) manualCorrections[key].in = true;
                                            if (hasOutAnom) manualCorrections[key].out = true;

                                            // [м¶”к?] ?ҢлӘ… ?өл? ?җлҸҷ ?¬мң  л°ҳмҳҒ лЎңм§Ғ
                                            const rawExp = employeeExplanations[key];
                                            if (rawExp) {
                                                const exps = rawExp.split(',').map(s => s.trim()).filter(s => s);
                                                if (exps.length === 1) {
                                                    manualReasons[key] = exps[0];
                                                } else if (exps.length >= 2) {
                                                    const abnormalExps = exps.filter(s => s !== '?•мғҒм¶ңк·ј' && s !== '?•мғҒ?ҙк·ј');
                                                    if (abnormalExps.length === 0) {
                                                        manualReasons[key] = '?•мғҒк·јл¬ҙ';
                                                    } else if (abnormalExps.length === 1) {
                                                        manualReasons[key] = abnormalExps[0];
                                                    } else {
                                                        alert('ліөн•©?Ғмқё ?ҢлӘ… ?¬мң к°Җ ?ҲмҠө?ҲлӢӨ. м§Ғм ‘ ?•мқё ???…л Ҙ?ҙмЈј?ёмҡ”.');
                                                    }
                                                }
                                                localStorage.setItem('manualReasons', JSON.stringify(manualReasons));
                                            }
                                        }
                                    }
                                    localStorage.setItem('manualCorrections', JSON.stringify(manualCorrections));
                                    verifyBtn.click();
                                    updateAndProcessData();
                                };

                                const modeSelect = tr.querySelector('.early-mode-select');
                                if (modeSelect) {
                                    modeSelect.onchange = (e) => {
                                        const key = modeSelect.getAttribute('data-key');
                                        const val = e.target.value;
                                        if (val === "") delete manualEarlyPunches[key];
                                        else manualEarlyPunches[key] = val;
                                        localStorage.setItem('manualEarlyPunches', JSON.stringify(manualEarlyPunches));
                                        verifyBtn.click();
                                        updateAndProcessData();
                                    };
                                }

                                const reasonInput = tr.querySelector('.manual-reason-input');
                                reasonInput.oninput = (e) => {
                                    const key = reasonInput.getAttribute('data-key');
                                    manualReasons[key] = e.target.value;
                                    localStorage.setItem('manualReasons', JSON.stringify(manualReasons));
                                    updateAndProcessData();
                                };

                                verifyTbody.appendChild(tr);
                            });
                        });
                    }
                    verifyModal.classList.remove('hidden');
                });
            }

            // [лӘЁлӢ¬ ?ҙкі  ?«кё° кҙҖ???ҙлІӨ??
            window.addEventListener('click', (e) => {
                // лӘЁлӢ¬??л°ҳнҲ¬лӘ?л°°кІҪл¶Җл¶?лӘЁлӢ¬ м»Ён…Ң?ҙл„Ҳ ?җмІҙ)???ҙлҰӯ?Ҳмқ„ ?Ңл§Ң ?«кё°
                if (e.target === verifyModal) verifyModal.classList.add('hidden');
                if (e.target === employeeModal) employeeModal.classList.add('hidden');
                if (e.target === holidayModal) holidayModal.classList.add('hidden');
            });

            // кіөнҶө ?ҙлІӨ??            reportDateInput.addEventListener('change', (e) => {
                document.querySelectorAll('.current-report-date-display').forEach(el => el.textContent = e.target.value);
            });

            if (openManagerBtn) {
                openManagerBtn.addEventListener('click', () => {
                    tempEmployeeConfigList = JSON.parse(JSON.stringify(employeeConfigList)); // ?Ҙм№ҙ?јлЎң мҙҲкё° ?Ғнғң ліөмӣҗ
                    renderEmployeeManager();
                    employeeModal.classList.remove('hidden');
                });
            }

            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', () => {
                    employeeModal.classList.add('hidden');
                });
            }

            if (saveEmployeeBtn) {
                saveEmployeeBtn.addEventListener('click', () => {
                    employeeConfigList = tempEmployeeConfigList.map(e => ({ ...e })); // ?Ҙм№ҙ??к°ңл…җ?јлЎң ?„мІҙ ?„л“ң ліөмӮ¬
                    localStorage.setItem('employeeConfigList', JSON.stringify(employeeConfigList));
                    updateAndProcessData();
                    alert('лӘ…лӢЁ??лЎңм»¬ ?ҳкІҪ???Җ??л°??Ғмҡ©?ҳм—Ҳ?өлӢҲ??');
                });
            }

            if (fetchEmployeesBtn) fetchEmployeesBtn.onclick = fetchEmployeesFromCloud;
            if (syncEmployeesBtn) syncEmployeesBtn.onclick = syncEmployeesToCloud;
            // кіөнңҙ???ҙлІӨ??            openHolidayBtn.onclick = () => {
                tempHolidayConfigList = JSON.parse(JSON.stringify(holidayConfigList));
                renderHolidayManager();
                holidayModal.classList.remove('hidden');
            };
            closeHolidayModalBtn.onclick = () => holidayModal.classList.add('hidden');

            addHolidayBtn.onclick = () => {
                const date = newHolidayDateInput.value;
                if (!date) return;
                if (tempHolidayConfigList.some(h => h.date === date)) {
                    alert('?ҙл? ?ұлЎқ??? м§ң?…лӢҲ??');
                    return;
                }
                tempHolidayConfigList.push({ date, name: "?¬мҡ©??м§Җ?? });
                renderHolidayManager();
            };

            autoFetchHolidayBtn.onclick = async () => {
                const selectedYear = document.getElementById('holiday-year-select').value;
                if (!selectedYear) return;

                const loader = autoFetchHolidayBtn.querySelector('.loader');
                const btnText = autoFetchHolidayBtn.querySelector('.btn-text');

                // лЎңл”© ?ңмӢң
                loader.classList.remove('hidden');
                btnText.textContent = `${selectedYear}???°мқҙ???•мқё мӨ?..`;
                autoFetchHolidayBtn.disabled = true;

                try {
                    // 1. ?ёл? ?җкІ© ?°мқҙ???ңлҸ„ (hyunbinseo/holidays-kr)
                    const response = await fetch('https://holidays.hyunbin.page/basic.json');
                    if (!response.ok) throw new Error('Network response was not ok');

                    const remoteData = await response.json();
                    const yearData = remoteData[selectedYear];
                    let fetchedCount = 0;

                    if (yearData) {
                        Object.entries(yearData).forEach(([date, names]) => {
                            const name = Array.isArray(names) ? names[0] : names;
                            if (!tempHolidayConfigList.some(h => h.date === date)) {
                                tempHolidayConfigList.push({ date, name });
                                fetchedCount++;
                            }
                        });
                    }

                    if (fetchedCount > 0) {
                        alert(`${selectedYear}??кіөнңҙ??${fetchedCount}кұҙмқ„ ?ёл??җм„ң ?ұкіө?ҒмңјлЎ?к°Җ?ёмҷ”?өлӢҲ??`);
                    } else {
                        // ?ёл? ?°мқҙ?°м—җ ?ҙлӢ№ ?°лҸ„к°Җ ?ҶлҠ” кІҪмҡ° ?ҙмһҘ ?°мқҙ???ңмҡ© (Fallback)
                        const internalMatches = PREDEFINED_HOLIDAYS.filter(h => h.date.startsWith(selectedYear));
                        let internalCount = 0;
                        internalMatches.forEach(pre => {
                            if (!tempHolidayConfigList.some(h => h.date === pre.date)) {
                                tempHolidayConfigList.push(pre);
                                internalCount++;
                            }
                        });

                        if (internalCount > 0) {
                            alert(`?ёл? ?ңлІ„??${selectedYear}???°мқҙ?°к? ?Ҷм–ҙ ?ҙмһҘ???°мқҙ?°л? ?ңмҡ©??${internalCount}кұҙмқ„ м¶”к??ҲмҠө?ҲлӢӨ.`);
                        } else {
                            alert(`${selectedYear}?„м—җ ?Җ??кіөнңҙ???°мқҙ?°к? мҪ”л“ң???ңлІ„??мЎҙмһ¬?ҳм? ?ҠмҠө?ҲлӢӨ.`);
                        }
                    }
                    renderHolidayManager();
                } catch (error) {
                    console.error('Holiday fetch error:', error);
                    // ?җлҹ¬ л°ңмғқ ???ҙмһҘ ?°мқҙ?°лЎң Fallback
                    const internalMatches = PREDEFINED_HOLIDAYS.filter(h => h.date.startsWith(selectedYear));
                    let internalCount = 0;
                    internalMatches.forEach(pre => {
                        if (!tempHolidayConfigList.some(h => h.date === pre.date)) {
                            tempHolidayConfigList.push(pre);
                            internalCount++;
                        }
                    });

                    if (internalCount > 0) {
                        alert(`?ён„°???°кІ° ?ӨлҘҳлЎ??ҙмһҘ ?°мқҙ??${selectedYear}??лҘ?${internalCount}кұ?л¶Ҳлҹ¬?”мҠө?ҲлӢӨ.`);
                    } else {
                        alert('кіөнңҙ???•ліҙлҘ?к°Җ?ёмҳӨм§Җ лӘ»н–Ҳ?өлӢҲ?? ?ён„°???°кІ°???•мқё?ҳкұ°???ҳмӨ‘???ӨмӢң ?ңлҸ„?ҙмЈј?ёмҡ”.');
                    }
                    renderHolidayManager();
                } finally {
                    loader.classList.add('hidden');
                    btnText.textContent = 'кіөнңҙ??к°Җ?ёмҳӨкё?;
                    autoFetchHolidayBtn.disabled = false;
                }
            };

            saveHolidayBtn.onclick = () => {
                holidayConfigList = JSON.parse(JSON.stringify(tempHolidayConfigList));
                localStorage.setItem('holidayConfigList', JSON.stringify(holidayConfigList));
                holidayModal.classList.add('hidden');
                updateAndProcessData();
            };

            closeVerifyBtn.onclick = () => verifyModal.classList.add('hidden');
            window.onclick = (e) => {
                if (e.target === employeeModal) employeeModal.classList.add('hidden');
                if (e.target === verifyModal) verifyModal.classList.add('hidden');
                if (e.target === holidayModal) holidayModal.classList.add('hidden');
            };
            printBtn.onclick = () => window.print();
        });
    </script>

                            ${isSubmitted ? `
                                <input type="text" value="${item.explanation}" readonly style="background-color: #f3f4f6; color: #4b5563;">
                            ` : (function () {
                            let reasonsArray = (item.reason || '').split(',').map(r => r.trim()).filter(r => r);
                            if (reasonsArray.length === 0) reasonsArray = [''];
                            let combinedHTML = '';
                            reasonsArray.forEach((r, idx) => {
                                let optionsHTML = '<option value="" disabled selected>사유를 선택해주세요</option>';
                                let customOptions = [];
                                if (r.includes('출근 기록 없음') || r.includes('지각')) customOptions.push('정상출근', '지각', '외근');
                                if (r.includes('퇴근 기록 없음') || r.includes('조기퇴근')) customOptions.push('정상퇴근', '조기퇴근', '외근');
                                customOptions = [...new Set(customOptions)];
                                if (customOptions.length === 0) customOptions = ['연차', '반차(오전)', '반차(오후)', '외근', '출장', '병가', '공가'];
                                customOptions.push('기타');
                                customOptions.forEach(opt => {
                                    optionsHTML += `<option value="${opt}">${opt === '기타' ? '기타 (직접 입력)' : opt}</option>`;
                                });
                                combinedHTML += `
                                    <div style="margin-bottom: 12px; padding: 10px; background-color: #f9fafb; border-radius: 6px; border: 1px solid #e5e7eb;">
                                        <div style="font-size: 0.85rem; color: #4b5563; margin-bottom: 6px; font-weight: 500;">[${r}]에 대한 사유 보완</div>
                                        <select id="reason-sel-${item.id}-${idx}" onchange="window.toggleCustomExplanation('${item.id}', ${idx})" style="margin-bottom: 8px; width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px;">
                                            ${optionsHTML}
                                        </select>
                                        <div id="comp-row-${item.id}-${idx}" style="display: none; margin-bottom: 8px;">
                                            <input type="text" id="comp-${item.id}-${idx}" placeholder="업체명을 입력해주세요" style="width: 100%; border: 1px solid #d1d5db; border-radius: 4px; padding: 8px; box-sizing: border-box;">
                                        </div>
                                        <div id="loc-row-${item.id}-${idx}" style="display: none; margin-bottom: 8px;">
                                            <input type="text" id="loc-${item.id}-${idx}" placeholder="지역명을 입력해주세요" style="width: 100%; border: 1px solid #d1d5db; border-radius: 4px; padding: 8px; box-sizing: border-box;">
                                        </div>
                                        <textarea id="exp-${item.id}-${idx}" rows="2" placeholder="기타 사유를 상세히 입력해주세요." style="display: none; width: 100%; border: 1px solid #d1d5db; border-radius: 4px; padding: 8px; box-sizing: border-box;"></textarea>
                                    </div>
                                `;
                            });
                            combinedHTML += `<input type="hidden" id="reason-cnt-${item.id}" value="${reasonsArray.length}">`;
                            return combinedHTML;
                        })()}
                        </div>
                        ${(isSubmitted || item.status === 'processed') ? `
                            <div class="status-submitted" style="justify-content: flex-end; font-size: 0.75rem; color: ${item.status === 'processed' ? '#059669' : '#9ca3af'};">
                                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                                </svg>
                                ${item.status === 'processed' ? '관리자가 내역을 확인했습니다' : '정상적으로 제출되었습니다'}
                            </div>
                        ` : `
                            <button class="btn btn-primary" onclick="window.submitExplanation('${item.id}')">보완 사유 제출하기</button>
                        `}
                    `;
                    listContainer.appendChild(div);
                });
            }
            window.toggleCustomExplanation = function (id, idx) {
                const select = document.getElementById(`reason-sel-${id}-${idx}`);
                const textarea = document.getElementById(`exp-${id}-${idx}`);
                const companyRow = document.getElementById(`comp-row-${id}-${idx}`);
                const locationRow = document.getElementById(`loc-row-${id}-${idx}`);
                if (!select) return;

                // 초기화
                if (textarea) textarea.style.display = 'none';
                if (companyRow) companyRow.style.display = 'none';
                if (locationRow) locationRow.style.display = 'none';

                if (select.value === '기타') {
                    if (textarea) {
                        textarea.style.display = 'block';
                        textarea.focus();
                    }
                } else if (select.value === '외근') {
                    if (companyRow) {
                        companyRow.style.display = 'block';
                        const input = companyRow.querySelector('input');
                        if (input) input.focus();
                    }
                } else if (select.value === '출장') {
                    if (locationRow) {
                        locationRow.style.display = 'block';
                        const input = locationRow.querySelector('input');
                        if (input) input.focus();
                    }
                }
            };

            window.handlePrepTypeChange = function () {
                const type = document.getElementById('prep-type').value;
                const companyGroup = document.getElementById('prep-company-group');
                const locationGroup = document.getElementById('prep-location-group');
                const detailsGroup = document.getElementById('prep-details-group');
                if (!companyGroup || !locationGroup || !detailsGroup) return;

                companyGroup.style.display = (type === '외근') ? 'block' : 'none';
                locationGroup.style.display = (type === '출장') ? 'block' : 'none';
                detailsGroup.style.display = (type === '기타') ? 'block' : 'none';
            };

            // [추가] 단일 항목의 사유 수집 및 성실 기입 검증 (사용자 요청: 한 날짜의 모든 사유 기입 여부 체크)
            window.gatherItemExplanation = function (itemDiv) {
                const itemId = itemDiv.dataset.id;
                const cntInput = document.getElementById(`reason-cnt-${itemId}`);
                if (!cntInput) return null;
                const count = parseInt(cntInput.value);
                let explanations = [];
                let filledCount = 0;

                for (let i = 0; i < count; i++) {
                    const select = document.getElementById(`reason-sel-${itemId}-${i}`);
                    if (!select) continue;
                    let exp = select.value;
                    if (exp) {
                        filledCount++;
                        if (exp === '기타') {
                            const textarea = document.getElementById(`exp-${itemId}-${i}`);
                            exp = textarea.value.trim();
                            if (!exp) return { error: "기타 사유를 입력해주세요.", itemId };
                        } else if (exp === '외근') {
                            const compInput = document.getElementById(`comp-${itemId}-${i}`);
                            if (compInput && compInput.value.trim()) {
                                exp = `외근 [${compInput.value.trim()}]`;
                            } else {
                                return { error: "업체명을 입력해주세요.", itemId };
                            }
                        } else if (exp === '출장') {
                            const locInput = document.getElementById(`loc-${itemId}-${i}`);
                            if (locInput && locInput.value.trim()) {
                                exp = `출장 [${locInput.value.trim()}]`;
                            } else {
                                return { error: "지역명을 입력해주세요.", itemId };
                            }
                        }
                        explanations.push(exp);
                    }
                }

                // 한 건이라도 건드렸으면 나머지도 다 채워야 함 (사용자 요청)
                if (filledCount > 0 && filledCount < count) {
                    return { error: "모든 사유를 선택해주세요.", itemId };
                }

                if (filledCount === 0) return null; // 아무것도 입력 안 함

                return { 
                    id: itemId, 
                    manager_key: itemDiv.dataset.manager_key,
                    name: itemDiv.dataset.name,
                    date: itemDiv.dataset.date,
                    reason: itemDiv.dataset.reason,
                    explanation: explanations.join(', '), 
                    status: 'submitted' 
                };
            };

            // [추가] 화면의 보완 내역 일괄 제출 로직
            window.submitAllExplanations = async function () {
                if (!supabase && !tryConnect()) { alert("시스템 연결 중입니다."); return; }
                
                const visibleItems = document.querySelectorAll('.anomaly-item');
                let updateData = [];
                let errorOccurred = false;

                visibleItems.forEach(itemDiv => {
                    if (errorOccurred) return;
                    
                    // 기제출된 건은 건너뜀 (제출 버튼 유무로 판단)
                    if (!itemDiv.querySelector('button[onclick*="submitExplanation"]')) return;

                    const data = window.gatherItemExplanation(itemDiv);
                    if (data && data.error) {
                        const dateLabel = itemDiv.querySelector('.date').innerText;
                        alert(`[${dateLabel}] ${data.error}`);
                        errorOccurred = true;
                        return;
                    }
                    if (data) updateData.push(data);
                });

                if (errorOccurred) return;
                if (updateData.length === 0) {
                    alert("제출할 사유를 선택하거나 입력해주세요.");
                    return;
                }

                if (!confirm(`총 ${updateData.length}건의 사유를 일괄 제출하시겠습니까?`)) return;

                const bulkBtn = document.getElementById('bulk-submit-btn');
                bulkBtn.disabled = true;
                bulkBtn.innerText = "제출 중...";

                try {
                    // Supabase upsert (id 기반 일괄 업데이트)
                    const { error } = await supabase
                        .from('attendance_anomalies')
                        .upsert(updateData, { onConflict: 'id' });

                    if (error) throw error;

                    alert(`${updateData.length}건의 사유가 성공적으로 제출되었습니다.`);
                    window.handleSearch(); // 목록 갱신
                } catch (err) {
                    alert('일괄 제출 중 오류가 발생했습니다: ' + err.message);
                } finally {
                    bulkBtn.disabled = false;
                    bulkBtn.innerText = "선택한 사유 일괄 제출";
                }
            };

            window.submitExplanation = async function (id) {
                const cntInput = document.getElementById(`reason-cnt-${id}`);
                const count = cntInput ? parseInt(cntInput.value) : 1;
                let explanations = [];
                for (let i = 0; i < count; i++) {
                    const select = document.getElementById(`reason-sel-${id}-${i}`);
                    if (!select) continue;
                    let exp = select.value;
                    if (!exp) { alert('모든 이상 사유에 대한 소명을 선택해주세요.'); return; }
                    if (exp === '기타') {
                        const textarea = document.getElementById(`exp-${id}-${i}`);
                        exp = textarea.value.trim();
                        if (!exp) { alert('기타 사유를 상세히 입력해주세요.'); return; }
                    } else if (exp === '외근') {
                        const compInput = document.getElementById(`comp-${id}-${i}`);
                        if (compInput && compInput.value.trim()) {
                            exp = `외근 [${compInput.value.trim()}]`;
                        } else {
                            alert('업체명을 입력해주세요.'); return;
                        }
                    } else if (exp === '출장') {
                        const locInput = document.getElementById(`loc-${id}-${i}`);
                        if (locInput && locInput.value.trim()) {
                            exp = `출장 [${locInput.value.trim()}]`;
                        } else {
                            alert('지역명을 입력해주세요.'); return;
                        }
                    }
                    explanations.push(exp);
                }
                const finalExplanation = explanations.join(', ');
                if (!confirm('입력하신 사유를 제출하시겠습니까?')) return;
                try {
                    const { error } = await supabase
                        .from('attendance_anomalies')
                        .update({ explanation: finalExplanation, status: 'submitted' })
                        .eq('id', id);
                    if (error) throw error;
                    alert('제출되었습니다. 감사합니다.');
                    window.handleSearch();
                } catch (err) {
                    alert('제출 오류: ' + err.message);
                }
            };

            window.handleSubmitPreemptive = async function () {
                if (!supabase && !tryConnect()) { alert("시스템 연결 중입니다. 잠시 후 시도해 주세요."); return; }
                const savedName = localStorage.getItem('attendance_user_name');
                const name = normalizeName(savedName);
                if (!name) { alert('로그인 정보가 없습니다. 메인 페이지로 이동합니다.'); location.href = 'index.html'; return; }
                const dateInput = document.getElementById('prep-date');
                const date = dateInput.value;
                if (!date) { alert('날짜를 선택해주세요.'); return; }
                const typeSelect = document.getElementById('prep-type');
                const detailsText = document.getElementById('prep-details');
                const companyInput = document.getElementById('prep-company');
                const locationInput = document.getElementById('prep-location');

                let type = typeSelect.value;
                let details = detailsText.value.trim();
                let additionalInfo = "";

                if (type === '외근') {
                    additionalInfo = companyInput.value.trim();
                    if (!additionalInfo) { alert('업체명을 입력해주세요.'); companyInput.focus(); return; }
                    additionalInfo = `[${additionalInfo}] `;
                } else if (type === '출장') {
                    additionalInfo = locationInput.value.trim();
                    if (!additionalInfo) { alert('지역명을 입력해주세요.'); locationInput.focus(); return; }
                    additionalInfo = `[${additionalInfo}] `;
                }

                if (!confirm(`${name}님의 ${date} 근태 기록을 '${type}'으로 사전 등록하시겠습니까?`)) return;
                const submitBtn = document.getElementById('submit-prep-btn');
                submitBtn.disabled = true;
                submitBtn.innerText = "등록 중...";
                try {
                    const { error } = await supabase.from('attendance_supplements').upsert({
                        name, date, type, details: additionalInfo + details, status: 'pending'
                    }, { onConflict: 'name,date' });
                    if (error) throw error;
                    const managerKey = `${name}_${date}`;
                    const fullExplanation = `${type}${ (additionalInfo + details) ? ` (${additionalInfo + details})` : ""}`;
                    await supabase.from('attendance_anomalies').upsert({
                        manager_key: managerKey, name, date,
                        explanation: fullExplanation, status: 'submitted'
                    }, { onConflict: 'manager_key' });
                    alert('성공적으로 등록되었습니다.\n관리자 페이지에 자동으로 반영됩니다.');
                    detailsText.value = '';
                    window.fetchPreemptiveHistory(name);
                } catch (err) {
                    alert('등록 오류: ' + err.message);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "사전 등록하기";
                }
            };

            window.fetchPreemptiveHistory = async function (name) {
                try {
                    const { data, error } = await supabase.from('attendance_supplements')
                        .select('*').eq('name', name).order('date', { ascending: false });
                    if (error) throw error;
                    renderPreemptiveHistory(data);
                } catch (err) {
                    console.error('사전 등록 내역 조회 실패:', err);
                }
            };

            function renderPreemptiveHistory(items) {
                const container = document.getElementById('preemptive-history-section');
                const list = document.getElementById('preemptive-history-list');
                if (!items || items.length === 0) { container.style.display = 'none'; return; }
                container.style.display = 'block';
                list.innerHTML = items.map(item => {
                    const isPending = item.status === 'pending';
                    return `
                        <div class="history-item">
                            <div class="history-header">
                                <div>
                                    <span class="history-type">${item.type}</span>
                                    <span class="status-tag ${isPending ? 'tag-pending' : 'tag-processed'}">${isPending ? '대기' : '확인됨'}</span>
                                </div>
                                <span class="history-date">${item.date}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: flex-end; gap: 10px;">
                                <div class="history-details" style="flex: 1;">${item.details || '상세 내용 없음'}</div>
                                ${item.status === 'pending' ? `<button class="cancel-btn" onclick="cancelPreemptiveRegistration('${item.id}')">취소</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.cancelPreemptiveRegistration = async function (id) {
                if (!confirm('해당 사전 등록 내역을 취소하시겠습니까?')) return;
                try {
                    // 1. 사전 등록 항목 조회
                    const { data: item, error: getError } = await supabase
                        .from('attendance_supplements').select('name, date').eq('id', id).single();
                    if (getError) throw getError;

                    const managerKey = `${item.name}_${item.date}`;

                    // 2. 해당 날짜의 이상근태 행 조회
                    const { data: anomaly } = await supabase
                        .from('attendance_anomalies')
                        .select('id, status, reason')
                        .eq('manager_key', managerKey)
                        .maybeSingle();

                    if (anomaly) {
                        // 관리자가 요청한 보완(auto/requested)이 있으면 → explanation만 비움 (행 유지)
                        // 사전 등록으로만 생성된 행(status=submitted, reason 없음)이면 → 행 삭제
                        const isOnlyFromPreemptive = anomaly.status === 'submitted' && !anomaly.reason;
                        if (isOnlyFromPreemptive) {
                            await supabase.from('attendance_anomalies').delete().eq('manager_key', managerKey);
                        } else {
                            // 관리자 요청 행은 유지하되 explanation만 초기화
                            await supabase.from('attendance_anomalies')
                                .update({ explanation: null, status: 'requested' })
                                .eq('manager_key', managerKey);
                        }
                    }

                    // 3. 사전 등록 내역 삭제
                    const { error } = await supabase.from('attendance_supplements').delete().eq('id', id);
                    if (error) throw error;

                    alert('취소되었습니다.');
                    const savedName = localStorage.getItem('attendance_user_name');
                    const name = normalizeName(savedName);
                    if (name) {
                        window.fetchPreemptiveHistory(name);
                        window.fetchMonthlyAttendance(name, currentYear, currentMonth);
                    }
                } catch (err) {
                    alert('취소 오류: ' + err.message);
                }
            };

            window.applyStatusFilter = function (mode, btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                let filtered = [];
                if (mode === 'all') filtered = currentAnomalies;
                else if (mode === 'request') filtered = currentAnomalies.filter(item => !item.explanation || item.explanation.trim() === '');
                else if (mode === 'complete') filtered = currentAnomalies.filter(item => item.explanation && item.explanation.trim() !== '');
                renderList(filtered);
            };

            window.switchTab = function (tab) {
                activeTab = tab;
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('anomalies-view').style.display = 'none';
                document.getElementById('calendar-view').style.display = 'none';
                document.getElementById('report-view').style.display = 'none';

                if (tab === 'anomalies') {
                    document.getElementById('tab-anomalies').classList.add('active');
                    document.getElementById('anomalies-view').style.display = 'block';
                } else if (tab === 'reports') {
                    document.getElementById('tab-reports').classList.add('active');
                    document.getElementById('report-view').style.display = 'block';
                    const savedName = localStorage.getItem('attendance_user_name');
                    const name = normalizeName(savedName);
                    const isAdmin = sessionStorage.getItem('attendance_user_is_admin') === 'true';
                    const isLeader = sessionStorage.getItem('attendance_user_is_leader') === 'true';
                    const modeBar = document.getElementById('report-view-mode-bar');
                    const btnTeam = document.getElementById('btn-mode-team');
                    const btnAll = document.getElementById('btn-mode-all');
                    if (modeBar) {
                        modeBar.style.display = (isAdmin || isLeader) ? 'flex' : 'none';
                        if (btnTeam) btnTeam.style.display = isLeader ? 'inline-flex' : 'none';
                        if (btnAll) btnAll.style.display = isAdmin ? 'inline-flex' : 'none';
                    }
                    if (name) window.loadReportList(name);
                } else {
                    document.getElementById('tab-calendar').classList.add('active');
                    document.getElementById('calendar-view').style.display = 'block';
                    const savedName = localStorage.getItem('attendance_user_name');
                    const name = normalizeName(savedName);
                    if (name) window.fetchMonthlyAttendance(name, currentYear, currentMonth);
                }
            };

            window.switchTabAndHighlight = function (date) {
                window.switchTab('anomalies');
                const reqFilterBtn = document.querySelector('.filter-btn[onclick*="request"]');
                if (reqFilterBtn) window.applyStatusFilter('request', reqFilterBtn);
                setTimeout(() => {
                    const target = document.getElementById(`anomaly-${date}`);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        target.classList.add('highlight-entry');
                        setTimeout(() => target.classList.remove('highlight-entry'), 2000);
                    } else {
                        console.warn(`${date} 내역을 찾을 수 없습니다.`);
                    }
                }, 100);
            };

            window.selectDateForPreemptive = function (date) {
                const dateInput = document.getElementById('prep-date');
                if (dateInput) {
                    dateInput.value = date;
                    const section = document.getElementById('preemptive-section');
                    if (section) {
                        section.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.4)';
                        setTimeout(() => section.style.boxShadow = '', 500);
                    }
                }
            };

            // ── 근태 보고서 탭 ────────────────────────────────────────────
            let reportViewMode = 'mine'; // 'mine' | 'all'

            window.setReportViewMode = function (mode) {
                // 권한 체크 — 팀장 아니면 team 모드 차단, 관리자 아니면 all 모드 차단
                const isAdmin = sessionStorage.getItem('attendance_user_is_admin') === 'true';
                const isLeader = sessionStorage.getItem('attendance_user_is_leader') === 'true';
                if (mode === 'team' && !isLeader) return;
                if (mode === 'all' && !isAdmin) return;

                reportViewMode = mode;
                document.querySelectorAll('.report-mode-btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.getElementById(
                    mode === 'mine' ? 'btn-mode-mine' :
                        mode === 'team' ? 'btn-mode-team' : 'btn-mode-all'
                );
                if (activeBtn) activeBtn.classList.add('active');
                document.getElementById('report-detail').style.display = 'none';
                document.getElementById('report-period-list').style.display = 'block';
                const savedName = localStorage.getItem('attendance_user_name');
                const name = normalizeName(savedName);
                if (name) window.loadReportList(name);
            };

            window.loadReportList = async function (name) {
                const listLoading = document.getElementById('report-list-loading');
                const itemsWrap = document.getElementById('report-period-items');
                const emptyMsg = document.getElementById('report-empty-msg');
                const detail = document.getElementById('report-detail');
                const periodList = document.getElementById('report-period-list');

                detail.style.display = 'none';
                periodList.style.display = 'block';
                listLoading.style.display = 'block';
                itemsWrap.innerHTML = '';
                emptyMsg.style.display = 'none';

                try {
                    const { data: reports, error } = await supabase
                        .from('attendance_reports')
                        .select('report_key, period_start, period_end, report_date, saved_at, printed_at, is_printed, names')
                        .order('period_start', { ascending: false });

                    if (error) throw error;

                    // 모드에 따라 필터
                    // mine: 인쇄완료 보고서는 전체(모든 사원 열람 가능) + 임시저장은 본인 포함 것만
                    // team: 같은 조직 (팀장)
                    // all: 전체 (관리자)
                    const isAdmin = sessionStorage.getItem('attendance_user_is_admin') === 'true';
                    const isLeader = sessionStorage.getItem('attendance_user_is_leader') === 'true';
                    const myOrg = sessionStorage.getItem('attendance_user_org') || '';
                    const filtered = reportViewMode === 'all' && isAdmin
                        ? (reports || [])
                        : reportViewMode === 'team' && isLeader
                            ? (reports || []).filter(r => Array.isArray(r.names) && r.names.some(() => true))
                            : (reports || []).filter(r =>
                                // 인쇄 완료 보고서는 모든 사원에게 공개
                                r.is_printed === true ||
                                // 임시저장은 본인이 포함된 것만
                                (Array.isArray(r.names) && r.names.includes(name))
                            );

                    if (filtered.length === 0) {
                        emptyMsg.textContent = reportViewMode === 'mine'
                            ? '확인 가능한 보고서가 없습니다.'
                            : '저장된 보고서가 없습니다.';
                        emptyMsg.style.display = 'block';
                        return;
                    }

                    filtered.forEach(r => {
                        const pill = document.createElement('button');
                        pill.className = 'report-period-pill';
                        const printedBadge = r.is_printed
                            ? `<span style="background:#dcfce7; color:#166534; border-radius:10px; font-size:0.72rem; font-weight:700; padding:1px 7px; margin-left:2px;">완료</span>`
                            : '';
                        pill.innerHTML = `
                            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
                            ${r.period_start} ~ ${r.period_end}
                            ${printedBadge}
                        `;
                        pill.onclick = () => {
                            document.querySelectorAll('.report-period-pill').forEach(p => p.classList.remove('selected'));
                            pill.classList.add('selected');
                            if (reportViewMode === 'all' && isAdmin) {
                                window.loadFullReportDetail(r.report_key, `${r.period_start} ~ ${r.period_end}`, null);
                            } else if (reportViewMode === 'team' && isLeader) {
                                window.loadFullReportDetail(r.report_key, `${r.period_start} ~ ${r.period_end}`, myOrg);
                            } else {
                                // mine 모드 — 인쇄 완료 여부 무관하게 항상 본인 기록만
                                window.loadReportDetail(name, r.report_key, `${r.period_start} ~ ${r.period_end}`);
                            }
                        };
                        itemsWrap.appendChild(pill);
                    });
                } catch (e) {
                    emptyMsg.textContent = '보고서 목록 조회 실패: ' + e.message;
                    emptyMsg.style.display = 'block';
                } finally {
                    listLoading.style.display = 'none';
                }
            };

            window.loadReportDetail = async function (name, reportKey, periodLabel) {
                const periodList = document.getElementById('report-period-list');
                const detail = document.getElementById('report-detail');
                const titleEl = document.getElementById('report-detail-title');
                const tableWrap = document.getElementById('report-table-wrap');

                titleEl.textContent = `${name} 님의 근태 기록 (${periodLabel})`;
                tableWrap.innerHTML = '<div class="loading" style="padding:20px;">데이터를 불러오는 중...</div>';
                detail.style.display = 'block';
                periodList.style.display = 'none';

                try {
                    const { data: report, error } = await supabase
                        .from('attendance_reports')
                        .select('snapshot, names')
                        .eq('report_key', reportKey)
                        .maybeSingle();

                    if (error) throw error;
                    if (!report || !report.snapshot || !report.snapshot[name]) {
                        tableWrap.innerHTML = '<div style="padding:24px; text-align:center; color:var(--text-sub);">해당 기간 데이터가 없습니다.</div>';
                        return;
                    }

                    const myData = report.snapshot[name];
                    const dates = Object.keys(myData).sort();
                    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

                    let thead = `<thead><tr><th style="text-align:left; padding-left:14px;">구분</th>`;
                    dates.forEach(dt => {
                        const d = new Date(dt);
                        const dow = weekdays[d.getDay()];
                        const color = d.getDay() === 0 ? '#ef4444' : d.getDay() === 6 ? '#3b82f6' : '';
                        thead += `<th class="th-date" style="${color ? `color:${color};` : ''}">${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}<br><span style="font-weight:400;">(${dow})</span></th>`;
                    });
                    thead += `</tr></thead>`;

                    // 출근 행
                    let rowIn = `<tr class="report-row-in"><td class="td-label">출근</td>`;
                    dates.forEach(dt => {
                        const rec = myData[dt];
                        const val = rec.inTime || '';
                        const cls = rec.confirmedIn ? 'td-confirmed' : (val ? '' : 'td-anomaly');
                        const display = val || (rec.confirmedIn ? '✓' : '-');
                        rowIn += `<td class="${cls}">${display}</td>`;
                    });
                    rowIn += `</tr>`;

                    // 퇴근 행
                    let rowOut = `<tr class="report-row-out"><td class="td-label">퇴근</td>`;
                    dates.forEach(dt => {
                        const rec = myData[dt];
                        const val = rec.outTime || '';
                        const cls = rec.confirmedOut ? 'td-confirmed' : (val ? '' : 'td-anomaly');
                        const display = val || (rec.confirmedOut ? '✓' : '-');
                        rowOut += `<td class="${cls}">${display}</td>`;
                    });
                    rowOut += `</tr>`;

                    // 사유 행
                    let rowReason = `<tr class="report-row-reason"><td class="td-label">사유</td>`;
                    dates.forEach(dt => {
                        const rec = myData[dt];
                        const reason = rec.reason || rec.managerReason || '';
                        rowReason += `<td class="td-reason">${reason}</td>`;
                    });
                    rowReason += `</tr>`;

                    tableWrap.innerHTML = `<table class="report-table">${thead}<tbody>${rowIn}${rowOut}${rowReason}</tbody></table>`;
                } catch (e) {
                    tableWrap.innerHTML = `<div style="padding:20px; color:#ef4444;">조회 오류: ${e.message}</div>`;
                }
            };

            // 관리자/팀장 전용: 전체 또는 팀 사원 매트릭스 보고서 열람
            // filterOrg: null이면 전체, 문자열이면 해당 조직만
            window.loadFullReportDetail = async function (reportKey, periodLabel, filterOrg) {
                const periodList = document.getElementById('report-period-list');
                const detail = document.getElementById('report-detail');
                const titleEl = document.getElementById('report-detail-title');
                const tableWrap = document.getElementById('report-table-wrap');

                const modeLabel = filterOrg ? `${filterOrg} 팀` : '전체';
                titleEl.textContent = `${modeLabel} 근태 보고서 (${periodLabel})`;
                tableWrap.innerHTML = '<div class="loading" style="padding:20px;">데이터를 불러오는 중...</div>';
                detail.style.display = 'block';
                periodList.style.display = 'none';

                try {
                    const { data: report, error } = await supabase
                        .from('attendance_reports')
                        .select('snapshot, names, period_start, period_end')
                        .eq('report_key', reportKey)
                        .maybeSingle();

                    if (error) throw error;
                    if (!report || !report.snapshot) {
                        tableWrap.innerHTML = '<div style="padding:24px; text-align:center; color:var(--text-sub);">데이터가 없습니다.</div>';
                        return;
                    }

                    let names = report.names || Object.keys(report.snapshot);

                    // 팀 필터링: employees 테이블에서 해당 org 사원 목록 조회
                    if (filterOrg) {
                        const { data: teamMembers } = await supabase
                            .from('employees')
                            .select('name')
                            .eq('org', filterOrg);
                        if (teamMembers && teamMembers.length > 0) {
                            const teamNames = new Set(teamMembers.map(e => e.name));
                            names = names.filter(n => teamNames.has(n));
                        }
                        if (names.length === 0) {
                            tableWrap.innerHTML = '<div style="padding:24px; text-align:center; color:var(--text-sub);">해당 팀 데이터가 없습니다.</div>';
                            return;
                        }
                    }

                    const snapshot = report.snapshot;
                    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

                    // 전체 날짜 수집 (필터된 사원 기준)
                    const dateSet = new Set();
                    names.forEach(n => { if (snapshot[n]) Object.keys(snapshot[n]).forEach(d => dateSet.add(d)); });
                    const dates = Array.from(dateSet).sort();

                    if (dates.length === 0) {
                        tableWrap.innerHTML = '<div style="padding:24px; text-align:center; color:var(--text-sub);">날짜 데이터가 없습니다.</div>';
                        return;
                    }

                    // 헤더
                    let thead = `<thead><tr>
                        <th class="col-name" style="position:sticky;left:0;z-index:3;background:#F3F4F6;">이름</th>
                        <th class="col-label" style="position:sticky;left:52px;z-index:3;background:#F3F4F6;"></th>`;
                    dates.forEach(dt => {
                        const d = new Date(dt);
                        const dow = weekdays[d.getDay()];
                        const color = d.getDay() === 0 ? 'color:#ef4444;' : d.getDay() === 6 ? 'color:#3b82f6;' : '';
                        thead += `<th style="min-width:46px;${color}">${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}<br><span style="font-weight:400;font-size:0.7rem;">(${dow})</span></th>`;
                    });
                    thead += `</tr></thead>`;

                    // 본문 — 사원별 출근/퇴근/사유 3행
                    let tbody = '<tbody>';
                    names.forEach(name => {
                        const rec = snapshot[name] || {};

                        let rowIn = `<tr><td class="sticky-name" rowspan="3">${name}</td><td class="sticky-lbl">출근</td>`;
                        dates.forEach(dt => {
                            const r = rec[dt];
                            if (!r) { rowIn += `<td>-</td>`; return; }
                            const val = r.inTime || '';
                            const cls = val === '연차' ? 'cell-annual' : val === '반차' ? 'cell-half' : r.confirmedIn ? 'cell-ok' : '';
                            rowIn += `<td class="${cls}">${val || (r.confirmedIn ? '✓' : '-')}</td>`;
                        });
                        rowIn += '</tr>';

                        let rowOut = `<tr><td class="sticky-lbl">퇴근</td>`;
                        dates.forEach(dt => {
                            const r = rec[dt];
                            if (!r) { rowOut += `<td>-</td>`; return; }
                            const val = r.outTime || '';
                            const cls = val === '연차' ? 'cell-annual' : val === '반차' ? 'cell-half' : r.confirmedOut ? 'cell-ok' : '';
                            rowOut += `<td class="${cls}">${val || (r.confirmedOut ? '✓' : '-')}</td>`;
                        });
                        rowOut += '</tr>';

                        let rowReason = `<tr class="emp-last"><td class="sticky-lbl">사유</td>`;
                        dates.forEach(dt => {
                            const r = rec[dt];
                            rowReason += `<td class="cell-reason">${r ? (r.reason || r.managerReason || '') : ''}</td>`;
                        });
                        rowReason += '</tr>';

                        tbody += rowIn + rowOut + rowReason;
                    });
                    tbody += '</tbody>';

                    tableWrap.innerHTML = `<div class="full-report-wrap"><table class="full-report-table">${thead}${tbody}</table></div>`;
                } catch (e) {
                    tableWrap.innerHTML = `<div style="padding:20px; color:#ef4444;">조회 오류: ${e.message}</div>`;
                }
            };
            // ─────────────────────────────────────────────────────────────

            window.changeMonth = function (offset) {
                currentMonth += offset;
                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
                const savedName = localStorage.getItem('attendance_user_name');
                const name = normalizeName(savedName);
                if (name) window.fetchMonthlyAttendance(name, currentYear, currentMonth);
            };

            window.fetchMonthlyAttendance = async function (name, year, month) {
                const title = document.getElementById('calendar-title');
                if (title) title.innerText = `${year}년 ${String(month).padStart(2, '0')}월`;
                const loader = document.getElementById('calendar-loading');
                if (loader) loader.style.display = 'block';
                try {
                    const startOfMonth = `${year}-${String(month).padStart(2, '0')}-01`;
                    const lastDay = new Date(year, month, 0).getDate();
                    const endOfMonth = `${year}-${String(month).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
                    const { data: attendance, error: attError } = await supabase
                        .from('attendance_records').select('date, in_time, out_time, shift, reason')
                        .eq('name', name).gte('date', startOfMonth).lte('date', endOfMonth);
                    if (attError) throw attError;
                    const { data: leaves, error: leafError } = await supabase
                        .from('attendance_supplements').select('date, type, details, status')
                        .eq('name', name).gte('date', startOfMonth).lte('date', endOfMonth);
                    if (leafError) throw leafError;
                    const { data: anomalies, error: anomError } = await supabase
                        .from('attendance_anomalies').select('date, explanation, status')
                        .eq('name', name).gte('date', startOfMonth).lte('date', endOfMonth);
                    if (anomError) throw anomError;
                    renderCalendar(year, month, attendance, leaves, anomalies);
                } catch (err) {
                    console.error('달력 조회 실패:', err);
                } finally {
                    if (loader) loader.style.display = 'none';
                }
            };

            function renderCalendar(year, month, attendance, leaves, anomalies) {
                const grid = document.getElementById('calendar-grid');
                const summaryContainer = document.getElementById('calendar-summary-container');
                if (!grid) return;

                const unsubmittedAnomaliesCount = anomalies.filter(a => !a.explanation || a.explanation.trim() === '').length;
                if (summaryContainer) {
                    if (unsubmittedAnomaliesCount > 0) {
                        summaryContainer.innerHTML = `
                            <div class="anomaly-summary-bar">
                                <span class="anomaly-summary-count">${unsubmittedAnomaliesCount}</span>
                                <span>이번 달에 보완(출퇴근 사유 입력)이 필요한 내역이 ${unsubmittedAnomaliesCount}건 있습니다.</span>
                            </div>
                        `;
                    } else {
                        summaryContainer.innerHTML = '';
                    }
                }

                const headers = grid.querySelectorAll('.day-header');
                grid.innerHTML = '';
                headers.forEach(h => grid.appendChild(h));

                const firstDay = new Date(year, month - 1, 1).getDay();
                const lastDay = new Date(year, month, 0).getDate();
                const prevLastDay = new Date(year, month - 1, 0).getDate();

                for (let i = firstDay - 1; i >= 0; i--) {
                    const cell = document.createElement('div');
                    cell.className = 'day-cell other-month';
                    cell.innerHTML = `<div class="day-number">${prevLastDay - i}</div>`;
                    grid.appendChild(cell);
                }

                for (let d = 1; d <= lastDay; d++) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayOfWeek = new Date(year, month - 1, d).getDay();
                    const record = attendance.find(r => r.date === dateStr);
                    const leaf = leaves.find(l => l.date === dateStr);
                    const anom = anomalies.find(a => a.date === dateStr);
                    const isUnsubmittedAnomaly = anom && (!anom.explanation || anom.explanation.trim() === '');

                    const cell = document.createElement('div');
                    cell.className = `day-cell ${dayOfWeek === 0 ? 'sun' : (dayOfWeek === 6 ? 'sat' : '')} ${isUnsubmittedAnomaly ? 'has-unsubmitted-anomaly' : ''}`;
                    cell.onclick = () => window.selectDateForPreemptive(dateStr);

                    let html = `<div class="day-number">${d}</div>`;
                    if (record) {
                        if (record.in_time) html += `<div class="cell-data time-in">출 ${record.in_time}</div>`;
                        if (record.out_time) html += `<div class="cell-data time-out">퇴 ${record.out_time}</div>`;
                        if (record.reason && record.reason.trim()) html += `<div class="cell-data day-reason">${record.reason}</div>`;
                    }
                    if (leaf) html += `<div class="cell-data day-leave">${leaf.type}${leaf.status === 'pending' ? '(대기)' : ''}</div>`;
                    if (anom) {
                        const isSubmitted = anom.explanation && anom.explanation.trim() !== '';
                        html += `<div class="cell-data day-anomaly ${isSubmitted ? 'submitted' : ''}" 
                                     ${!isSubmitted ? `onclick="window.switchTabAndHighlight('${dateStr}')"` : ''} 
                                     style="${!isSubmitted ? 'cursor: pointer;' : ''}">
                            ${isSubmitted ? '[제출 완료]' : '[보완 요청]'}
                        </div>`;
                    }
                    cell.innerHTML = html;
                    grid.appendChild(cell);
                }

                const remainingCells = 42 - (firstDay + lastDay);
                if (remainingCells > 0 && remainingCells < 14) {
                    for (let i = 1; i <= remainingCells; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'day-cell other-month';
                        cell.innerHTML = `<div class="day-number">${i}</div>`;
                        grid.appendChild(cell);
                    }
                }
            }

            window.openPinChangeModal = function () {
                document.getElementById('pin-modal-overlay').style.display = 'flex';
                document.getElementById('current-pin-input').value = '';
                document.getElementById('new-pin-input').value = '';
                document.getElementById('new-pin-confirm').value = '';
                document.getElementById('current-pin-input').focus();
            };

            window.closePinChangeModal = function () {
                document.getElementById('pin-modal-overlay').style.display = 'none';
            };

            window.handleUpdatePin = async function () {
                const currentPinInput = document.getElementById('current-pin-input').value;
                const newPin = document.getElementById('new-pin-input').value;
                const confirmPin = document.getElementById('new-pin-confirm').value;
                const savedPin = localStorage.getItem('attendance_user_pin');
                const savedName = localStorage.getItem('attendance_user_name');
                const name = normalizeName(savedName);

                if (currentPinInput !== savedPin) { alert('현재 확인코드가 일치하지 않습니다.'); return; }
                if (newPin.length !== 4 || confirmPin.length !== 4) { alert('새로운 PIN은 숫자 4자리로 입력해주세요.'); return; }
                if (newPin !== confirmPin) { alert('새로운 확인코드가 서로 일치하지 않습니다.'); return; }
                if (currentPinInput === newPin) { alert('현재와 동일한 기존 확인코드입니다. 다른 번호를 입력해주세요.'); return; }
                if (!confirm('확인코드를 변경하시겠습니까?')) return;

                try {
                    const { data: collision, error: checkError } = await supabase
                        .from('employees').select('name').eq('name', name).eq('pin', newPin).maybeSingle();
                    if (checkError) throw checkError;
                    if (collision) { alert('이미 동일한 성함의 다른 분이 해당 확인코드를 사용 중입니다. 다른 코드를 입력해주세요.'); return; }
                    const { error } = await supabase.from('employees')
                        .update({ pin: newPin }).eq('name', name).eq('pin', savedPin);
                    if (error) throw error;
                    localStorage.setItem('attendance_user_pin', newPin);
                    alert('성공적으로 변경되었습니다.');
                    window.closePinChangeModal();
                } catch (err) {
                    alert('변경 오류: ' + err.message);
                }
            };

            window.handleReset = function () {
                if (!confirm('로그아웃 하시겠습니까?')) return;
                localStorage.removeItem('attendance_user_name');
                localStorage.removeItem('attendance_user_pin');
                sessionStorage.removeItem('attendance_user_is_admin');
                sessionStorage.removeItem('attendance_user_is_leader');
                sessionStorage.removeItem('attendance_user_org');
                location.href = 'index.html';
            };

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('prep-date').value = today;

            if (!tryConnect()) {
                const checkInt = setInterval(() => {
                    if (tryConnect()) { clearInterval(checkInt); checkAutoLogin(); }
                }, 500);
            } else {
                checkAutoLogin();
            }

            async function checkAutoLogin() {
                const savedName = localStorage.getItem('attendance_user_name');
                const savedPin = localStorage.getItem('attendance_user_pin');
                if (savedName && savedPin) {
                    console.log('자동 로그인 시도 중...');
                    await window.handleSearch();
                    const isAdmin = sessionStorage.getItem('attendance_user_is_admin') === 'true';
                    const adminBtn = document.getElementById('go-admin-btn');
                    if (adminBtn) adminBtn.style.display = isAdmin ? 'block' : 'none';
                }
            }
        })();
    </script>


</html>
